<!DOCTYPE html>
<html lang="vi" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>404 - Trang không tồn tại | Nguyễn Văn Hảo</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2322C55E'/%3E%3Crect x='5' y='5' width='90' height='90' rx='15' fill='none' stroke='%231F2937' stroke-width='6'/%3E%3Ctext x='50' y='70' font-family='Arial Black' font-size='60' font-weight='bold' fill='white' text-anchor='middle'%3EH%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #F8FAFC;
            color: #1F2937;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 24px;
        }

        .container {
            max-width: 520px;
        }

        .error-code {
            font-size: clamp(6rem, 20vw, 10rem);
            font-weight: 800;
            color: #22C55E;
            line-height: 1;
            margin-bottom: 8px;
            text-shadow: 6px 6px 0 #1F2937;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 16px;
        }

        p {
            color: #6B7280;
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
            border: 3px solid #1F2937;
        }

        .btn-primary {
            background: #22C55E;
            color: #fff;
            box-shadow: 4px 4px 0 #1F2937;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 4px 6px 0 #1F2937;
        }

        .btn-outline {
            background: #fff;
            color: #1F2937;
            box-shadow: 4px 4px 0 #E5E7EB;
        }

        .btn-outline:hover {
            transform: translateY(-2px);
            box-shadow: 4px 6px 0 #E5E7EB;
        }

        .emoji {
            font-size: 3rem;
            margin-bottom: 16px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="emoji">🔍</div>
        <div class="error-code">404</div>
        <h1>Trang không tồn tại</h1>
        <p>Oops! Trang bạn đang tìm kiếm có thể đã bị xóa, đổi tên hoặc tạm thời không khả dụng.</p>
        <div class="actions">
            <a href="/" class="btn btn-primary">← Về trang chủ</a>
            <a href="/blog" class="btn btn-outline">📖 Đọc Blog</a>
        </div>
    </div>
</body>

</html>
