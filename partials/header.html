<!-- Contact Modal -->
<div class="modal-overlay" id="contactModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Gửi tin nhắn</h3>
            <button class="modal-close" id="modalClose">✕</button>
        </div>
        <form id="modalContactForm" action="https://formspree.io/f/mlggdnlv" method="POST">
            <div class="form-group">
                <label class="form-label" for="modalName">Họ và tên *</label>
                <input type="text" id="modalName" name="name" class="form-input" placeholder="Nhập họ và tên..."
                    required>
            </div>
            <div class="form-group">
                <label class="form-label" for="modalEmail">Email *</label>
                <input type="email" id="modalEmail" name="email" class="form-input" placeholder="Nhập email..."
                    required>
            </div>
            <div class="form-group">
                <label class="form-label" for="modalMessage">Tin nhắn *</label>
                <textarea id="modalMessage" name="message" class="form-textarea" placeholder="Nhập nội dung tin nhắn..."
                    required></textarea>
            </div>
            <button type="submit" class="btn btn-primary form-submit btn-lg" style="width: 100%;">
                Gửi tin nhắn →
            </button>
        </form>
    </div>
</div>
