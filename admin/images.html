<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý hình ảnh - Admin</title>
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2322C55E'/><text x='50' y='70' font-family='Arial Black' font-size='60' font-weight='bold' fill='white' text-anchor='middle'>H</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin/css/admin.css">
    <style>
        .drop-zone {
            border: 3px dashed #cbd5e1;
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            background: #f8fafc;
        }

        .drop-zone.dragover {
            border-color: #22C55E;
            background: #f0fdf4;
        }

        .drop-zone-text {
            color: #64748b;
            font-size: 0.95rem;
        }

        .drop-zone-text strong {
            color: #22C55E;
        }

        .upload-preview {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 16px;
        }

        .upload-preview-item {
            position: relative;
            width: 100px;
            height: 100px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #e2e8f0;
        }

        .upload-preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .upload-preview-item .remove {
            position: absolute;
            top: 2px;
            right: 2px;
            background: #ef4444;
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 0.7rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-bar input {
            flex: 1;
            min-width: 200px;
        }

        .image-stats {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .image-stats .stat {
            background: #f1f5f9;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #475569;
        }

        .image-stats .stat strong {
            color: #22C55E;
        }
    </style>
</head>

<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <a href="/admin/index.html" class="admin-logo"><span class="logo-icon">H</span> Admin</a>
            <nav class="admin-nav">
                <a href="/admin/index.html" class="nav-item">📊 Dashboard</a>
                <a href="/admin/posts.html" class="nav-item">📝 Bài viết</a>
                <a href="/admin/categories.html" class="nav-item">📂 Danh mục</a>
                <a href="/admin/images.html" class="nav-item active">🖼️ Hình ảnh</a>
                <a href="/admin/newsletter.html" class="nav-item">📧 Subscribers</a>
                <a href="/admin/banner.html" class="nav-item">🎨 Tạo Banner</a>
                <a href="/admin/ai-studio.html" class="nav-item">🤖 AI Studio</a>
                <a href="/admin/auto-news.html" class="nav-item">🔄 Auto-News</a>
                <a href="/admin/synctune.html" class="nav-item">🎵 SyncTune</a>
                <a href="/admin/tools.html" class="nav-item">🧰 Công cụ</a>
                <a href="/admin/settings.html" class="nav-item">⚙️ Cấu hình</a>
                <div class="nav-divider"></div>
                <a href="/" class="nav-item" target="_blank">🌐 Xem trang</a>
                <a href="#" class="nav-item logout" id="logoutBtn">🚪 Đăng xuất</a>
            </nav>
        </aside>

        <main class="admin-main">
            <header class="admin-header">
                <h1>🖼️ Quản lý hình ảnh</h1>
            </header>

            <div class="admin-content">
                <!-- Drag & Drop Multi Upload -->
                <div class="card" style="margin-bottom: 24px;">
                    <div class="card-header">
                        <h3>Upload hình ảnh</h3>
                    </div>
                    <div style="padding: 24px;">
                        <div class="drop-zone" id="dropZone" onclick="document.getElementById('multiFiles').click()">
                            <p class="drop-zone-text">📁 <strong>Kéo thả</strong> hoặc <strong>click</strong> để chọn
                                ảnh (hỗ trợ nhiều ảnh)</p>
                        </div>
                        <input type="file" id="multiFiles" accept="image/*" multiple style="display:none"
                            onchange="handleFiles(this.files)">
                        <div class="upload-preview" id="uploadPreview"></div>
                        <button class="btn btn-primary" id="btnUploadAll" style="margin-top: 16px; display: none;"
                            onclick="uploadAll()">🚀 Upload tất cả</button>
                    </div>
                </div>

                <!-- Search + Stats -->
                <div class="image-stats" id="imageStats"></div>
                <div class="search-bar">
                    <input type="text" id="imageSearch" class="form-input"
                        placeholder="🔍 Tìm kiếm theo tên, alt text..." oninput="filterImages()">
                    <select id="imageSortBy" class="form-select" style="width: auto;" onchange="filterImages()">
                        <option value="newest">Mới nhất</option>
                        <option value="oldest">Cũ nhất</option>
                        <option value="name">Tên A-Z</option>
                    </select>
                </div>

                <!-- Images Grid -->
                <div class="image-grid" id="imagesGrid">
                    <p style="grid-column: 1/-1; text-align: center; padding: 60px;">Đang tải...</p>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/api.js"></script>
    <script src="/admin/js/admin.js?v=20260323c"></script>
    <script>
        let allImages = [];
        let pendingFiles = [];

        document.addEventListener('DOMContentLoaded', async () => {
            await checkAuth();
            await loadAllImages();
            setupDragDrop();
        });

        // Drag & Drop
        function setupDragDrop() {
            const zone = document.getElementById('dropZone');
            ['dragenter', 'dragover'].forEach(ev => zone.addEventListener(ev, e => { e.preventDefault(); zone.classList.add('dragover'); }));
            ['dragleave', 'drop'].forEach(ev => zone.addEventListener(ev, e => { e.preventDefault(); zone.classList.remove('dragover'); }));
            zone.addEventListener('drop', e => handleFiles(e.dataTransfer.files));
        }

        function handleFiles(fileList) {
            const preview = document.getElementById('uploadPreview');
            for (const file of fileList) {
                if (!file.type.startsWith('image/')) continue;
                pendingFiles.push(file);
                const div = document.createElement('div');
                div.className = 'upload-preview-item';
                div.innerHTML = `<img src="${URL.createObjectURL(file)}"><button class="remove" onclick="removePending(${pendingFiles.length - 1}, this)">✕</button>`;
                preview.appendChild(div);
            }
            if (pendingFiles.length > 0) document.getElementById('btnUploadAll').style.display = 'inline-flex';
        }

        function removePending(idx, btn) {
            pendingFiles[idx] = null;
            btn.parentElement.remove();
            if (pendingFiles.filter(Boolean).length === 0) {
                document.getElementById('btnUploadAll').style.display = 'none';
                pendingFiles = [];
            }
        }

        async function uploadAll() {
            const btn = document.getElementById('btnUploadAll');
            const files = pendingFiles.filter(Boolean);
            if (files.length === 0) return;
            btn.disabled = true; btn.textContent = `⏳ Upload 0/${files.length}...`;
            let success = 0;
            for (let i = 0; i < files.length; i++) {
                try {
                    await uploadImageFile(files[i]);
                    success++;
                } catch (e) { console.error(e); }
                btn.textContent = `⏳ Upload ${success}/${files.length}...`;
            }
            showToast(`✅ Upload ${success}/${files.length} ảnh thành công!`, 'success');
            pendingFiles = [];
            document.getElementById('uploadPreview').innerHTML = '';
            btn.style.display = 'none';
            btn.disabled = false; btn.textContent = '🚀 Upload tất cả';
            await loadAllImages();
        }

        async function loadAllImages() {
            try {
                const response = await API.getImages();
                allImages = Array.isArray(response) ? response : (response?.data || []);
                updateStats();
                filterImages();
            } catch (error) {
                document.getElementById('imagesGrid').innerHTML = `<p style="color: red; grid-column: 1/-1; text-align: center;">Lỗi: ${error.message}</p>`;
            }
        }

        function updateStats() {
            const el = document.getElementById('imageStats');
            el.innerHTML = `
                <div class="stat">📊 Tổng: <strong>${allImages.length}</strong> ảnh</div>
            `;
        }

        function filterImages() {
            const query = (document.getElementById('imageSearch')?.value || '').toLowerCase().trim();
            const sort = document.getElementById('imageSortBy')?.value || 'newest';
            let filtered = allImages;
            if (query) {
                filtered = filtered.filter(img =>
                    (img.filename || '').toLowerCase().includes(query) ||
                    (img.alt_text || '').toLowerCase().includes(query) ||
                    (img.url || '').toLowerCase().includes(query)
                );
            }
            if (sort === 'oldest') filtered = [...filtered].reverse();
            else if (sort === 'name') filtered = [...filtered].sort((a, b) => (a.filename || '').localeCompare(b.filename || ''));

            renderImages(filtered);
        }

        function renderImages(images) {
            const grid = document.getElementById('imagesGrid');
            if (images.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; padding: 40px; color: #94a3b8;">Không tìm thấy ảnh nào.</p>';
                return;
            }

            grid.innerHTML = images.map(img => `
                <div class="image-card">
                    <img src="${img.url}" alt="${escapeHtml(img.alt_text || img.filename || '')}" loading="lazy">
                    <div class="image-card-info" style="padding: 12px;">
                        <p style="font-weight: 600; font-size: 0.85rem; color: #334155; margin: 0 0 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" title="${escapeHtml(img.filename || '')}">${escapeHtml((img.filename || '').substring(0, 35))}</p>
                        <p style="font-size: 0.78rem; color: #94a3b8; margin: 0 0 8px;">${escapeHtml(img.alt_text || 'Chưa có alt text')}</p>
                        <div style="display: flex; gap: 6px;">
                            <button onclick="copyImageUrl('${img.url}')" style="font-size:0.78rem;background:#6366f1;color:#fff;border:none;padding:4px 12px;border-radius:6px;cursor:pointer;">📋 Copy</button>
                            <button onclick="confirmDeleteImage('${img.id}')" style="font-size:0.78rem;background:#ef4444;color:#fff;border:none;padding:4px 12px;border-radius:6px;cursor:pointer;">🗑️ Xóa</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function copyImageUrl(url) {
            navigator.clipboard.writeText(url).then(() => showToast('📋 Đã copy URL!', 'success'));
        }

        async function confirmDeleteImage(id) {
            if (!confirm('Xóa ảnh này?')) return;
            try {
                await API.deleteImage(id);
                showToast('✅ Đã xóa!', 'success');
                await loadAllImages();
            } catch (e) {
                showToast('Lỗi: ' + e.message, 'error');
            }
        }
    </script>
</body>

</html>
