    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            await checkAuth();
            await loadCategoriesManagement();
        });

        // Modal Logic
        async function openCategoryModal(id = null) {
            document.getElementById('modalTitle').textContent = id ? 'Sá»­a danh má»¥c' : 'ThÃªm danh má»¥c';
            document.getElementById('categoryForm').reset();
            document.getElementById('categoryId').value = '';
            document.getElementById('categoryModal').classList.add('active');

            if (id) {
                try {
                    // Fetch all categories and find the one to edit (since we don't have getCategory yet, or use getCategories with id param if supported)
                    // Efficient way: use the API.getCategories({id: id}) if supported or just filter from list
                    // Let's implement API.getCategory(id) or just iterate since list is small. 
                    // Better: API.getCategories returns list.
                    const categories = await API.getCategories();
                    const category = categories.find(c => c.id == id);

                    if (category) {
                        document.getElementById('categoryId').value = category.id;
                        document.getElementById('categoryName').value = category.name;
                        document.getElementById('categorySlug').value = category.slug;
                        document.getElementById('categoryColor').value = category.color || '#22C55E';
                        document.getElementById('categoryColorText').value = category.color || '#22C55E';
                    }
                } catch (e) {
                    console.error('Error fetching category details', e);
                }
            }
        }

        function closeCategoryModal() {
            document.getElementById('categoryModal').classList.remove('active');
        }

        window.openCategoryModal = openCategoryModal;
        window.closeCategoryModal = closeCategoryModal;
        window.editCategory = openCategoryModal;

        // Form Submit
        document.getElementById('categoryForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.textContent = 'Äang lÆ°u...';

            const result = await saveCategory({
                id: document.getElementById('categoryId').value || null,
                name: document.getElementById('categoryName').value,
                slug: document.getElementById('categorySlug').value,
                color: document.getElementById('categoryColor').value
            });

            btn.disabled = false;
            btn.textContent = 'LÆ°u danh má»¥c';

            if (result.success) {
                showToast('ÄÃ£ lÆ°u!', 'success');
                closeCategoryModal();
                await loadCategoriesManagement();
            } else {
                showToast('Lá»—i: ' + result.error, 'error');
            }
        });
        // Color Picker Sync
        const colorInput = document.getElementById('categoryColor');
        const colorText = document.getElementById('categoryColorText');

        if (colorInput && colorText) {
            colorInput.addEventListener('input', (e) => {
                colorText.value = e.target.value.toUpperCase();
            });

            colorText.addEventListener('input', (e) => {
                let val = e.target.value;
                if (!val.startsWith('#')) {
                    val = '#' + val;
                }
                if (val.length === 7) {
                    colorInput.value = val;
                }
            });

            // Sync on change (paste)
            colorText.addEventListener('change', (e) => {
                let val = e.target.value;
                if (!val.startsWith('#')) val = '#' + val;
                if (val.length === 7) colorInput.value = val;
                // normalize
                e.target.value = val.toUpperCase();
            });
        }
    </script>
