<!DOCTYPE html>
<html lang="vi" data-theme="light">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Google Keyword Wrapper - Nguyễn Văn Hảo</title>
  <meta name="description" content="Bọc từ khóa với các match types cho Google Ads">
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2322C55E'/%3E%3Ctext x='50' y='70' font-family='Arial Black' font-size='60' font-weight='bold' fill='white' text-anchor='middle'%3EH%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css?v=1.4">
  <link rel="stylesheet" href="/css/style.css?v=1.5">
  <link rel="stylesheet" href="/css/toolkit.css">
</head>

<body>
  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo"><span class="logo-icon">H</span><span class="hide-mobile">Nguyễn Văn Hảo</span></a>
      <nav class="nav">
        <button class="menu-toggle" id="menuToggle" aria-label="Menu"><span></span><span></span><span></span></button>
        <ul class="nav-list" id="navList">
          <li><a href="/" class="nav-link">Trang chủ</a></li>
          <li><a href="/blog.html" class="nav-link">Blog</a></li>
          <li><a href="/about.html" class="nav-link">Giới thiệu</a></li>
          <li><a href="/contact.html" class="nav-link">Liên hệ</a></li>
          <li><a href="/toolkit/" class="nav-link">Công cụ</a></li>
        </ul>
        <a href="/contact.html" class="btn btn-primary hide-mobile">Liên hệ ngay</a>
      </nav>
    </div>
  </header>

  <section class="tool-page">
    <div class="container">
      <a href="/toolkit/" class="back-link">← Quay lại Toolkit</a>
      <div class="tool-header">
        <h1>Google Keyword Wrapper</h1>
        <p>Bọc từ khóa với các match types cho Google Ads</p>
      </div>

      <div class="tool-card-wrap">
        <div class="form-group">
          <label for="inputKeywords">Nhập keywords</label>
          <textarea id="inputKeywords" placeholder="Nhập một từ khoá mỗi dòng hoặc ngăn cách dấu phẩy"></textarea>
        </div>

        <div class="tool-actions">
          <button id="btnGenerate" class="tool-btn tool-btn-primary">Generate</button>
          <button id="btnLowercase" class="tool-btn tool-btn-outline">Chuyển sang chữ thường</button>
          <button id="btnReset" class="tool-btn tool-btn-danger">Reset</button>
        </div>

        <div class="tool-grid-3" style="margin-top:24px;">
          <div class="form-group">
            <label for="outputPhrase">Khớp cụm từ</label>
            <textarea id="outputPhrase" readonly></textarea>
            <button id="copyPhrase" class="tool-btn tool-btn-success" style="width:100%;margin-top:8px;">Copy</button>
          </div>
          <div class="form-group">
            <label for="outputExact">Khớp chính xác</label>
            <textarea id="outputExact" readonly></textarea>
            <button id="copyExact" class="tool-btn tool-btn-success" style="width:100%;margin-top:8px;">Copy</button>
          </div>
          <div class="form-group">
            <label for="outputNegative">Từ khoá phủ định</label>
            <textarea id="outputNegative" readonly></textarea>
            <button id="copyNegative" class="tool-btn tool-btn-success" style="width:100%;margin-top:8px;">Copy</button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>
    const $ = id => document.getElementById(id);

    function parseInput(txt) {
      return txt.split(/[\r\n,]+/).map(s => s.trim()).filter(Boolean);
    }

    function generate() {
      const raw = $('inputKeywords').value;
      const kws = parseInput(raw);
      const phrase = [], exact = [], negative = [];
      kws.forEach(kw => {
        phrase.push(`"${kw}"`);
        exact.push(`[${kw}]`);
        negative.push(`-${kw}`);
      });
      $('outputPhrase').value = phrase.join('\n');
      $('outputExact').value = exact.join('\n');
      $('outputNegative').value = negative.join('\n');
    }

    function copyText(id) {
      const txt = $(id).value;
      navigator.clipboard.writeText(txt).then(() => {
        const btn = $(id.replace('output', 'copy'));
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = orig, 1200);
      });
    }

    function toLowercase() {
      $('inputKeywords').value = $('inputKeywords').value.toLowerCase();
    }

    function resetAll() {
      $('inputKeywords').value = '';
      $('outputPhrase').value = '';
      $('outputExact').value = '';
      $('outputNegative').value = '';
    }

    $('btnGenerate').addEventListener('click', generate);
    $('btnLowercase').addEventListener('click', toLowercase);
    $('btnReset').addEventListener('click', resetAll);
    $('copyPhrase').addEventListener('click', () => copyText('outputPhrase'));
    $('copyExact').addEventListener('click', () => copyText('outputExact'));
    $('copyNegative').addEventListener('click', () => copyText('outputNegative'));

    // Mobile menu
    const menuToggle = document.getElementById('menuToggle');
    const navList = document.getElementById('navList');
    if (menuToggle) menuToggle.addEventListener('click', () => { navList.classList.toggle('active'); menuToggle.classList.toggle('active'); });
  </script>
</body>

</html>
