<!DOCTYPE html>
<html lang="vi" data-theme="light">

<head>
  <script src="/js/tracking.js"></script>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Google Keyword Wrapper - Nguyễn Văn Hảo</title>
  <meta name="description" content="Bọc từ khóa với các match types cho Google Ads">
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2322C55E'/%3E%3Ctext x='50' y='70' font-family='Arial Black' font-size='60' font-weight='bold' fill='white' text-anchor='middle'%3EH%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css?v=1.4">
  <link rel="stylesheet" href="/css/style.css?v=1.5">
  <link rel="stylesheet" href="/css/toolkit.css?v=20260323">
</head>

<body>
  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo"><span class="logo-icon">H</span><span class="hide-mobile">Nguyễn Văn Hảo</span></a>
      <nav class="nav">
        <button class="menu-toggle" id="menuToggle" aria-label="Menu"><span></span><span></span><span></span></button>
        <ul class="nav-list" id="navList">
          <li><a href="/" class="nav-link">Trang chủ</a></li>
          <li><a href="/blog" class="nav-link">Blog</a></li>
          <li><a href="/gioi-thieu" class="nav-link">Giới thiệu</a></li>
          <li><a href="/lien-he" class="nav-link">Liên hệ</a></li>
          <li><a href="/toolkit/" class="nav-link">Công cụ</a></li>
        </ul>
        <a href="/lien-he" class="btn btn-primary hide-mobile">Liên hệ ngay</a>
      </nav>
    </div>
  </header>

  <section class="calc-page">
    <div class="container">
      <a href="/toolkit/" class="back-link">← Quay lại Toolkit</a>
      <div class="calc-header">
        <span class="section-badge" style="background:var(--color-lavender);margin-bottom:12px;display:inline-block;">🔑
          Keyword Tool</span>
        <h1>Google Keyword Wrapper</h1>
        <p>Bọc từ khóa với các match types cho Google Ads</p>
      </div>

      <div class="calc-grid">
        <!-- Input card -->
        <div class="calc-card full-width">
          <h2><i class="ph-bold ph-text-aa" style="color:var(--color-primary)"></i> Nhập Keywords</h2>
          <div class="input-group">
            <label>Danh sách từ khóa (mỗi dòng 1 từ khóa hoặc ngăn cách bằng dấu phẩy)</label>
            <textarea id="inputKeywords" rows="5"
              placeholder="Nhập một từ khoá mỗi dòng hoặc ngăn cách dấu phẩy"></textarea>
          </div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;">
            <button id="btnGenerate" class="btn-calc" style="flex:1;min-width:180px;">Generate</button>
            <button id="btnLowercase" class="btn-copy" style="flex:0;">Chuyển chữ thường</button>
            <button id="btnReset" class="btn-copy" style="flex:0;color:#ef4444;border-color:#ef4444;">Reset</button>
          </div>
        </div>

        <!-- Output: Phrase match -->
        <div class="calc-card">
          <h2>📌 Khớp cụm từ</h2>
          <div class="input-group">
            <textarea id="outputPhrase" readonly rows="6" style="background:var(--color-bg,#f8fafc);"></textarea>
          </div>
          <button id="copyPhrase" class="btn-copy" style="width:100%;">Sao chép</button>
        </div>

        <!-- Output: Exact match -->
        <div class="calc-card">
          <h2>🎯 Khớp chính xác</h2>
          <div class="input-group">
            <textarea id="outputExact" readonly rows="6" style="background:var(--color-bg,#f8fafc);"></textarea>
          </div>
          <button id="copyExact" class="btn-copy" style="width:100%;">Sao chép</button>
        </div>

        <!-- Output: Negative -->
        <div class="calc-card full-width">
          <h2>🚫 Từ khóa phủ định</h2>
          <div class="input-group">
            <textarea id="outputNegative" readonly rows="4" style="background:var(--color-bg,#f8fafc);"></textarea>
          </div>
          <button id="copyNegative" class="btn-copy" style="width:100%;">Sao chép</button>
        </div>
      </div>
    </div>
  </section>

  <script src="/js/main.js?v=1.4"></script>
  <script>
    const $ = id => document.getElementById(id);

    function parseInput(txt) {
      return txt.split(/[\r\n,]+/).map(s => s.trim()).filter(Boolean);
    }

    function generate() {
      const raw = $('inputKeywords').value;
      const kws = parseInput(raw);
      const phrase = [], exact = [], negative = [];
      kws.forEach(kw => {
        phrase.push(`"${kw}"`);
        exact.push(`[${kw}]`);
        negative.push(`-${kw}`);
      });
      $('outputPhrase').value = phrase.join('\n');
      $('outputExact').value = exact.join('\n');
      $('outputNegative').value = negative.join('\n');
    }

    function copyText(id) {
      const txt = $(id).value;
      navigator.clipboard.writeText(txt).then(() => {
        const btn = $(id.replace('output', 'copy'));
        const orig = btn.textContent;
        btn.textContent = 'Đã chép!';
        setTimeout(() => btn.textContent = orig, 1200);
      });
    }

    $('btnGenerate').addEventListener('click', generate);
    $('btnLowercase').addEventListener('click', () => { $('inputKeywords').value = $('inputKeywords').value.toLowerCase(); });
    $('btnReset').addEventListener('click', () => { $('inputKeywords').value = ''; $('outputPhrase').value = ''; $('outputExact').value = ''; $('outputNegative').value = ''; });
    $('copyPhrase').addEventListener('click', () => copyText('outputPhrase'));
    $('copyExact').addEventListener('click', () => copyText('outputExact'));
    $('copyNegative').addEventListener('click', () => copyText('outputNegative'));
  </script>
</body>

</html>
