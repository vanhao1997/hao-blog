<!DOCTYPE html>
<html lang="vi" data-theme="light">

<head>
    <script src="/js/tracking.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hoạch định Từ khóa Google Ads - Nguyễn Văn Hảo</title>
    <meta name="description" content="AI xây dựng chiến lược từ khóa Google Ads toàn diện">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2322C55E'/%3E%3Ctext x='50' y='70' font-family='Arial Black' font-size='60' font-weight='bold' fill='white' text-anchor='middle'%3EH%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/main.css?v=1.4">
    <link rel="stylesheet" href="/css/style.css?v=1.5">
    <link rel="stylesheet" href="/css/toolkit.css?v=20260323">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        #results table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        #results th,
        #results td {
            border: 1px solid var(--color-border);
            padding: 10px 14px;
            font-size: 0.9rem;
        }

        #results th {
            background: var(--color-bg, #f8fafc);
            font-weight: 700;
        }

        #results tbody tr:hover {
            background: #f0fdf4;
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="container header-inner">
            <a href="/" class="logo"><span class="logo-icon">H</span><span class="hide-mobile">Nguyễn Văn Hảo</span></a>
            <nav class="nav">
                <button class="menu-toggle" id="menuToggle"
                    aria-label="Menu"><span></span><span></span><span></span></button>
                <ul class="nav-list" id="navList">
                    <li><a href="/" class="nav-link">Trang chủ</a></li>
                    <li><a href="/blog" class="nav-link">Blog</a></li>
                    <li><a href="/gioi-thieu" class="nav-link">Giới thiệu</a></li>
                    <li><a href="/lien-he" class="nav-link">Liên hệ</a></li>
                    <li><a href="/toolkit/" class="nav-link">Công cụ</a></li>
                </ul>
                <a href="/lien-he" class="btn btn-primary hide-mobile">Liên hệ ngay</a>
            </nav>
        </div>
    </header>

    <section class="calc-page">
        <div class="container">
            <a href="/toolkit/" class="back-link">← Quay lại Toolkit</a>
            <div class="calc-header">
                <span class="section-badge"
                    style="background:var(--color-lavender);margin-bottom:12px;display:inline-block;">🤖 AI Tool</span>
                <h1>AI Hoạch định Từ khóa Google Ads</h1>
                <p>Điền thông tin chi tiết, AI sẽ xây dựng chiến lược từ khóa hoàn chỉnh</p>
            </div>

            <div class="calc-grid">
                <!-- Input card -->
                <div class="calc-card">
                    <h2>🏢 Thông tin doanh nghiệp</h2>
                    <div class="input-group">
                        <label>Lĩnh vực kinh doanh</label>
                        <input type="text" id="field" value="Công nghệ và Dịch vụ B2B">
                    </div>
                    <div class="input-group">
                        <label>Mô tả sản phẩm/dịch vụ</label>
                        <textarea id="productInfo"
                            rows="3">Dịch vụ thiết kế website chuyên nghiệp cho doanh nghiệp vừa và nhỏ, tập trung vào tối ưu SEO và giao diện thân thiện trên di động.</textarea>
                    </div>
                    <div class="input-group">
                        <label>Đối thủ cạnh tranh (tùy chọn)</label>
                        <input type="text" id="competitors" value="ABC Agency, XYZ Web Design">
                    </div>
                </div>

                <!-- Target card -->
                <div class="calc-card">
                    <h2>🎯 Mục tiêu & Đối tượng</h2>
                    <div class="input-group">
                        <label>Mục tiêu chiến dịch</label>
                        <input type="text" id="goal" value="Thu thập khách hàng tiềm năng (leads)">
                    </div>
                    <div class="input-group">
                        <label>Đối tượng khách hàng mục tiêu</label>
                        <textarea id="audience"
                            rows="3">Chủ doanh nghiệp nhỏ, độ tuổi 30-50, đang cần một website chuyên nghiệp để mở rộng kinh doanh nhưng có ngân sách hạn chế.</textarea>
                    </div>
                    <div class="input-group">
                        <label>Thị trường mục tiêu</label>
                        <input type="text" id="market" value="Thành phố Hồ Chí Minh và Hà Nội">
                    </div>
                </div>

                <!-- Action -->
                <div class="calc-card full-width">
                    <button class="btn-calc" onclick="generateStrategy()">Tạo Chiến lược Từ khóa</button>
                    <div id="status" style="margin-top:12px;font-size:0.9rem;color:var(--color-gray);min-height:20px;">
                    </div>
                </div>

                <!-- Results -->
                <div class="calc-card full-width" id="results"></div>
            </div>
        </div>
    </section>

    <script src="/js/main.js?v=1.4"></script>
    <script>
        const GEMINI_API_KEY = 'AIzaSyDzzWNOmeZHzYUk-ve14wpNGA5VVO6gX2c';

        function setStatus(message, loading = false) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = loading ? `<span class="tool-spinner"></span>${message}` : message;
        }

        async function generateStrategy() {
            const field = document.getElementById('field').value;
            const productInfo = document.getElementById('productInfo').value;
            const goal = document.getElementById('goal').value;
            const audience = document.getElementById('audience').value;
            const market = document.getElementById('market').value;
            const competitors = document.getElementById('competitors').value;

            if (!field || !productInfo || !goal || !audience || !market) {
                setStatus('Vui lòng điền đầy đủ các thông tin cần thiết.', false);
                return;
            }

            setStatus('AI đang phân tích và xây dựng chiến lược, vui lòng chờ...', true);
            document.getElementById('results').innerHTML = '';

            const prompt = `
            1. VAI TRÒ: Hãy đóng vai một chuyên gia Google Ads với 10 năm kinh nghiệm, chuyên sâu về nghiên cứu và lập chiến lược từ khóa cho các doanh nghiệp trong lĩnh vực "${field}".
            2. THÔNG TIN CHI TIẾT:
            - Sản phẩm/Dịch vụ: "${productInfo}".
            - Mục tiêu chiến dịch: "${goal}".
            - Đối tượng khách hàng: "${audience}".
            - Thị trường: "${market}".
            - Đối thủ cạnh tranh: "${competitors}".
            3. YÊU CẦU:
            - Tạo danh sách từ khóa toàn diện (short-tail + long-tail).
            - Phân loại theo ý định tìm kiếm: Informational, Commercial, Transactional, Navigational.
            - Phân nhóm thành Ad Groups logic.
            - Đề xuất 3-5 Negative Keywords cho mỗi nhóm.
            4. ĐỊNH DẠNG: Bảng Markdown:
            | Tên Nhóm Quảng Cáo | Từ Khóa | Ý Định Tìm Kiếm | Từ Khóa Phủ Định Đề Xuất |
            | --- | --- | --- | --- |
            `;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "contents": [{ "parts": [{ "text": prompt }] }] })
                });

                if (!response.ok) throw new Error('Yêu cầu đến API Gemini thất bại.');

                const data = await response.json();
                const aiResponseText = data.candidates[0].content.parts[0].text;

                document.getElementById('results').innerHTML = '<h2>📊 Chiến lược từ khóa</h2>' + marked.parse(aiResponseText);
                setStatus('Chiến lược từ khóa đã được tạo thành công!', false);

            } catch (error) {
                console.error("Lỗi:", error);
                setStatus('Đã xảy ra lỗi khi gọi API Gemini.', false);
            }
        }
    </script>
</body>

</html>
