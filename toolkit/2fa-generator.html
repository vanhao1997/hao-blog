<!DOCTYPE html>
<html lang="vi" data-theme="light">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2FA Manager - Nguyễn Văn Hảo</title>
  <meta name="description" content="Quản lý mã xác thực 2FA (TOTP)">
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2322C55E'/%3E%3Ctext x='50' y='70' font-family='Arial Black' font-size='60' font-weight='bold' fill='white' text-anchor='middle'%3EH%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css?v=1.4">
  <link rel="stylesheet" href="/css/style.css?v=1.5">
  <link rel="stylesheet" href="/css/toolkit.css">
  <style>
    #entries {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      margin-top: 24px;
    }

    .entry {
      background: var(--color-white);
      padding: 20px;
      border-radius: 16px;
      border: 2px solid var(--color-border);
      display: flex;
      flex-direction: column;
    }

    .entry-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .entry-label {
      font-weight: 700;
      font-size: 1rem;
    }

    .code-display {
      font-family: "Courier New", monospace;
      font-size: 1.8rem;
      letter-spacing: 4px;
      text-align: center;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .countdown {
      height: 4px;
      background: var(--color-border);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 100%;
      background: var(--color-primary);
      transition: width 1s linear;
    }

    .buttons {
      margin-top: 12px;
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    input[type=file] {
      display: none;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsSHA/2.4.2/sha.js"></script>
</head>

<body>
  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo"><span class="logo-icon">H</span><span class="hide-mobile">Nguyễn Văn Hảo</span></a>
      <nav class="nav">
        <button class="menu-toggle" id="menuToggle" aria-label="Menu"><span></span><span></span><span></span></button>
        <ul class="nav-list" id="navList">
          <li><a href="/" class="nav-link">Trang chủ</a></li>
          <li><a href="/blog.html" class="nav-link">Blog</a></li>
          <li><a href="/about.html" class="nav-link">Giới thiệu</a></li>
          <li><a href="/contact.html" class="nav-link">Liên hệ</a></li>
          <li><a href="/toolkit/" class="nav-link">Công cụ</a></li>
        </ul>
        <a href="/contact.html" class="btn btn-primary hide-mobile">Liên hệ ngay</a>
      </nav>
    </div>
  </header>

  <section class="tool-page">
    <div class="container">
      <a href="/toolkit/" class="back-link">← Quay lại Toolkit</a>
      <div class="tool-header">
        <h1>2FA Manager</h1>
        <p>Quản lý mã xác thực 2 lớp (TOTP)</p>
      </div>

      <div class="tool-card-wrap wide">
        <div class="tool-actions">
          <button id="btnExport" class="tool-btn tool-btn-success">Xuất JSON</button>
          <button id="btnImport" class="tool-btn tool-btn-outline">Nhập JSON</button>
        </div>

        <input type="file" id="importFile" accept="application/json" />
        <form id="addForm" style="margin-top:20px;">
          <label for="labelInput">Tên dịch vụ</label>
          <input id="labelInput" type="text" placeholder="Ví dụ: Gmail, GitHub" required />
          <label for="secretInput">Secret Key (Base32)</label>
          <input id="secretInput" type="text" placeholder="JBSWY3DPEHPK3PXP" required autocomplete="off" />
          <button type="submit" id="submitBtn" class="tool-btn tool-btn-primary" style="margin-top:12px;">Thêm
            2FA</button>
        </form>

        <div id="entries"></div>
      </div>
    </div>
  </section>

  <script>
    const STORAGE_KEY = '2faEntries';
    const btnExport = document.getElementById('btnExport');
    const btnImport = document.getElementById('btnImport');
    const importFile = document.getElementById('importFile');
    const form = document.getElementById('addForm');
    const labelInput = document.getElementById('labelInput');
    const secretInput = document.getElementById('secretInput');
    const entriesDiv = document.getElementById('entries');
    const submitBtn = document.getElementById('submitBtn');
    let editIndex = null;

    function loadEntries() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; } }
    function saveEntries(items) { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); }

    function base32tohex(base32) {
      const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ234567";
      base32 = base32.replace(/=+$/, '').replace(/\s+/g, '').toUpperCase().replace(/[^A-Z2-7]/g, '');
      let bits = '', hex = '';
      for (const c of base32) bits += alphabet.indexOf(c).toString(2).padStart(5, '0');
      for (let i = 0; i + 4 <= bits.length; i += 4) hex += parseInt(bits.substr(i, 4), 2).toString(16);
      return hex;
    }

    function generateTOTP(secret) {
      try {
        const key = base32tohex(secret); const epoch = Math.floor(Date.now() / 1000);
        const time = Math.floor(epoch / 30).toString(16).padStart(16, '0');
        const sha = new jsSHA('SHA-1', 'HEX'); sha.setHMACKey(key, 'HEX'); sha.update(time);
        const hmac = sha.getHMAC('HEX'); const offset = parseInt(hmac.substr(-1), 16);
        const bin = parseInt(hmac.substr(offset * 2, 8), 16) & 0x7fffffff;
        return (bin % 1000000).toString().padStart(6, '0');
      } catch { return '------'; }
    }

    function render() {
      entriesDiv.innerHTML = '';
      loadEntries().forEach((item, index) => {
        const div = document.createElement('div'); div.className = 'entry'; div.dataset.index = index;
        div.innerHTML = `<div class="entry-header"><span class="entry-label">${item.label}</span></div><div class="code-display">------</div><div class="countdown"><div class="progress-bar"></div></div><div class="buttons"><button class="tool-btn tool-btn-outline" style="padding:6px 12px;font-size:0.8rem;" onclick="editEntry(${index})">Sửa</button><button class="tool-btn tool-btn-success" style="padding:6px 12px;font-size:0.8rem;" onclick="copyCode(this)">Copy</button><button class="tool-btn tool-btn-danger" style="padding:6px 12px;font-size:0.8rem;" onclick="deleteEntry(${index})">Xóa</button></div>`;
        entriesDiv.appendChild(div);
      });
      updateAll();
    }

    window.deleteEntry = function (idx) { const arr = loadEntries(); arr.splice(idx, 1); saveEntries(arr); render(); };
    window.copyCode = function (btn) { const code = btn.closest('.entry').querySelector('.code-display').textContent; navigator.clipboard.writeText(code); btn.textContent = 'Copied!'; setTimeout(() => btn.textContent = 'Copy', 1200); };
    window.editEntry = function (idx) { const items = loadEntries(); labelInput.value = items[idx].label; secretInput.value = items[idx].secret; submitBtn.textContent = 'Cập nhật'; editIndex = idx; };

    function updateAll() {
      const now = Math.floor(Date.now() / 1000), remain = 30 - (now % 30);
      document.querySelectorAll('.entry').forEach(div => {
        const idx = +div.dataset.index; const items = loadEntries();
        div.querySelector('.code-display').textContent = generateTOTP(items[idx].secret);
        div.querySelector('.progress-bar').style.width = (remain / 30 * 100) + '%';
      });
    }

    btnExport.onclick = () => { const data = JSON.stringify(loadEntries(), null, 2); const blob = new Blob([data], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = '2fa_backup.json'; document.body.appendChild(a); a.click(); a.remove(); };
    btnImport.onclick = () => importFile.click();
    importFile.onchange = e => { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = evt => { try { const arr = JSON.parse(evt.target.result); if (Array.isArray(arr)) { saveEntries(arr); render(); alert('Đã nhập ' + arr.length + ' mục'); } else alert('File không đúng định dạng JSON'); } catch { alert('Lỗi khi đọc file JSON'); } }; reader.readAsText(file); importFile.value = null; };

    form.onsubmit = e => { e.preventDefault(); const label = labelInput.value.trim(), secret = secretInput.value.trim(); if (!label || !secret) return; const items = loadEntries(); if (editIndex !== null) items[editIndex] = { label, secret }; else items.push({ label, secret }); saveEntries(items); labelInput.value = ''; secretInput.value = ''; submitBtn.textContent = 'Thêm 2FA'; editIndex = null; render(); };

    render(); setInterval(updateAll, 1000);

    // Mobile menu
    const menuToggle = document.getElementById('menuToggle');
    const navList = document.getElementById('navList');
    if (menuToggle) menuToggle.addEventListener('click', () => { navList.classList.toggle('active'); menuToggle.classList.toggle('active'); });
  </script>
</body>

</html>
