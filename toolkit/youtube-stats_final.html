<!DOCTYPE html>
<html lang="vi" data-theme="light">

<head>
    <script src="/js/tracking.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phân tích Kênh YouTube - Nguyễn Văn Hảo</title>
    <meta name="description" content="Phân tích kênh YouTube, lấy danh sách video và xuất Excel">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2322C55E'/%3E%3Ctext x='50' y='70' font-family='Arial Black' font-size='60' font-weight='bold' fill='white' text-anchor='middle'%3EH%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/main.css?v=1.4">
    <link rel="stylesheet" href="/css/style.css?v=1.5">
    <link rel="stylesheet" href="/css/toolkit.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        .spinner {
            border: 3px solid var(--color-border);
            border-top: 3px solid #c00;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            display: inline-block;
            vertical-align: middle;
            animation: spin 1s linear infinite;
            margin-right: 6px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .channel-card {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            border: 1px solid var(--color-border);
            border-radius: 12px;
            background: var(--color-bg, #f8fafc);
            margin-bottom: 16px;
        }

        .channel-card img {
            border-radius: 50%;
            width: 64px;
            height: 64px;
            object-fit: cover;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            margin-top: 12px;
        }

        .data-table th,
        .data-table td {
            border: 1px solid var(--color-border);
            padding: 8px;
            text-align: left;
        }

        .data-table th {
            background: var(--color-bg, #f8fafc);
            font-weight: 700;
        }

        .data-table tr:nth-child(even) {
            background: rgba(0, 0, 0, .02);
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="container header-inner">
            <a href="/" class="logo"><span class="logo-icon">H</span><span class="hide-mobile">Nguyễn Văn Hảo</span></a>
            <nav class="nav">
                <button class="menu-toggle" id="menuToggle"
                    aria-label="Menu"><span></span><span></span><span></span></button>
                <ul class="nav-list" id="navList">
                    <li><a href="/" class="nav-link">Trang chủ</a></li>
                    <li><a href="/blog" class="nav-link">Blog</a></li>
                    <li><a href="/gioi-thieu" class="nav-link">Giới thiệu</a></li>
                    <li><a href="/lien-he" class="nav-link">Liên hệ</a></li>
                    <li><a href="/toolkit/" class="nav-link">Công cụ</a></li>
                </ul>
                <a href="/lien-he" class="btn btn-primary hide-mobile">Liên hệ ngay</a>
            </nav>
        </div>
    </header>

    <section class="calc-page">
        <div class="container">
            <a href="/toolkit/" class="back-link">← Quay lại Toolkit</a>
            <div class="calc-header">
                <span class="section-badge"
                    style="background:var(--color-lavender);margin-bottom:12px;display:inline-block;">📈 YouTube
                    Analytics</span>
                <h1>Phân tích Kênh YouTube</h1>
                <p>Dán URL kênh, chọn khoảng thời gian (không bắt buộc) và nhấn nút.</p>
            </div>

            <div class="calc-grid">
                <div class="calc-card full-width">
                    <h2>🔍 Nhập thông tin kênh</h2>
                    <div class="input-group" style="margin-bottom:12px;">
                        <label>URL Kênh YouTube</label>
                        <input type="text" id="channelUrlInput"
                            placeholder="Ví dụ: https://www.youtube.com/@hoptri.summit">
                    </div>
                    <div class="input-row cols-3">
                        <div class="input-group"><label>Từ ngày</label><input type="date" id="startDate"></div>
                        <div class="input-group"><label>Đến ngày</label><input type="date" id="endDate"></div>
                        <div class="input-group" style="display:flex;align-items:flex-end;">
                            <button class="btn-calc" onclick="fetchChannelData()" style="width:100%;">Lấy Dữ
                                Liệu</button>
                        </div>
                    </div>
                    <div id="status" style="margin-top:12px;font-size:0.85rem;color:var(--color-gray);min-height:24px;">
                    </div>
                </div>

                <div class="calc-card full-width" id="results"></div>
            </div>
        </div>
    </section>

    <script src="/js/main.js?v=1.4"></script>
    <script>
        const API_KEY = "AIzaSyC0Fy4N2WDafvslGRRG49enEQsbcMKjHvQ";
        const YOUTUBE_API_BASE_URL = "https://www.googleapis.com/youtube/v3";
        let currentVideoStats = [];
        let currentChannelTitle = "";

        function setStatus(message, loading = false) {
            const statusDiv = document.getElementById('status');
            if (loading) { statusDiv.innerHTML = `<span class="spinner"></span>${message}`; }
            else { statusDiv.textContent = message; }
        }

        async function fetchChannelData() {
            setStatus('Đang xử lý...', true);
            const channelUrl = document.getElementById('channelUrlInput').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';
            if (!channelUrl) { setStatus('Vui lòng nhập URL của kênh.', false); return; }
            try {
                const handle = extractHandleFromUrl(channelUrl);
                const channelId = handle ? await getChannelIdByHandle(handle) : null;
                if (!channelId) { setStatus('Không tìm thấy kênh hoặc URL không hợp lệ.', false); return; }
                const channelData = await getChannelDetails(channelId);
                displayChannelInfo(channelData);
                const uploadsPlaylistId = channelData.contentDetails.relatedPlaylists.uploads;
                const videos = await getAllVideosFromPlaylist(uploadsPlaylistId, startDate, endDate);
                if (videos.length === 0) { document.getElementById('results').innerHTML += "<p style='text-align:center;color:var(--color-gray);padding:24px;'>Không có video nào trong khoảng thời gian đã chọn.</p>"; setStatus('Hoàn thành: không có dữ liệu.', false); return; }
                const videoIds = videos.map(v => v.snippet.resourceId.videoId);
                const videoStats = await getVideoStatistics(videoIds);
                displayVideoTable(videoStats);
                setStatus('Hoàn thành.', false);
            } catch (error) { console.error(error); setStatus('Đã xảy ra lỗi khi gọi API.', false); }
        }

        function extractHandleFromUrl(url) { const match = url.match(/@([\w.-]+)/); return match ? match[1] : null; }

        async function getChannelIdByHandle(handle) {
            const url = `${YOUTUBE_API_BASE_URL}/search?part=id&q=@${handle}&type=channel&key=${API_KEY}`;
            const response = await fetch(url); const data = await response.json();
            return data.items?.[0]?.id?.channelId;
        }

        async function getChannelDetails(channelId) {
            const url = `${YOUTUBE_API_BASE_URL}/channels?part=snippet,statistics,contentDetails&id=${channelId}&key=${API_KEY}`;
            const response = await fetch(url); const data = await response.json();
            return data.items[0];
        }

        async function getAllVideosFromPlaylist(playlistId, startDate, endDate) {
            let allVideos = [], nextPageToken = null;
            do {
                const url = `${YOUTUBE_API_BASE_URL}/playlistItems?part=snippet&playlistId=${playlistId}&maxResults=50&pageToken=${nextPageToken || ''}&key=${API_KEY}`;
                const response = await fetch(url); const data = await response.json();
                allVideos = allVideos.concat(data.items); nextPageToken = data.nextPageToken;
            } while (nextPageToken);
            if (startDate || endDate) {
                const start = startDate ? new Date(startDate) : null;
                const end = endDate ? new Date(endDate) : null;
                if (start) start.setHours(0, 0, 0, 0);
                if (end) end.setHours(23, 59, 59, 999);
                return allVideos.filter(v => { const pub = new Date(v.snippet.publishedAt); return (!start || pub >= start) && (!end || pub <= end); });
            }
            return allVideos;
        }

        async function getVideoStatistics(ids) {
            let details = [];
            for (let i = 0; i < ids.length; i += 50) {
                const chunk = ids.slice(i, i + 50);
                const url = `${YOUTUBE_API_BASE_URL}/videos?part=snippet,statistics&id=${chunk.join(',')}&key=${API_KEY}`;
                const resp = await fetch(url); const data = await resp.json();
                details = details.concat(data.items);
            }
            return details;
        }

        function displayChannelInfo(data) {
            const resultsDiv = document.getElementById('results');
            const snip = data.snippet, stats = data.statistics;
            currentChannelTitle = snip.title || "";
            const fmt = new Intl.NumberFormat('vi-VN');
            resultsDiv.innerHTML = `
            <h2>Thông tin Kênh</h2>
            <div class="channel-card">
                <img src="${snip.thumbnails.default.url}" alt="Ảnh đại diện kênh">
                <div>
                    <strong style="font-size:1.1rem;">${snip.title}</strong>
                    <div style="font-size:0.85rem;color:var(--color-gray);margin-top:4px;">
                        <strong>${fmt.format(stats.subscriberCount)}</strong> Subscribers · 
                        <strong>${fmt.format(stats.videoCount)}</strong> Videos · 
                        <strong>${fmt.format(stats.viewCount)}</strong> Lượt xem
                    </div>
                </div>
            </div>
            <div id="video-list"></div>`;
        }

        function displayVideoTable(videos) {
            const div = document.getElementById('video-list');
            const fmt = new Intl.NumberFormat('vi-VN');
            currentVideoStats = [...videos];
            videos.sort((a, b) => new Date(b.snippet.publishedAt) - new Date(a.snippet.publishedAt));
            let html = `
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
                <h2 style="margin:0;">Chi tiết Video (${videos.length})</h2>
                <button class="btn-calc" onclick="downloadExcel()">Tải file Excel</button>
            </div>
            <table class="data-table"><thead><tr><th>Tiêu đề Video</th><th>Ngày đăng</th><th>Lượt xem</th><th>Lượt thích</th><th>Bình luận</th></tr></thead><tbody>`;
            for (const v of videos) {
                html += `<tr><td>${v.snippet.title}</td><td>${new Date(v.snippet.publishedAt).toLocaleDateString('vi-VN')}</td><td>${fmt.format(v.statistics.viewCount)}</td><td>${fmt.format(v.statistics.likeCount || 0)}</td><td>${fmt.format(v.statistics.commentCount || 0)}</td></tr>`;
            }
            html += '</tbody></table>';
            div.innerHTML = html;
        }

        function downloadExcel() {
            if (!currentVideoStats.length) { alert("Không có dữ liệu để xuất."); return; }
            const rows = currentVideoStats.sort((a, b) => new Date(b.snippet.publishedAt) - new Date(a.snippet.publishedAt)).map(v => {
                const id = v.id || v.snippet.resourceId.videoId || "";
                return { "Tiêu đề": v.snippet.title, "Ngày đăng": new Date(v.snippet.publishedAt).toLocaleDateString('vi-VN'), "Lượt xem": Number(v.statistics.viewCount || 0), "Lượt thích": Number(v.statistics.likeCount || 0), "Bình luận": Number(v.statistics.commentCount || 0), "URL Video": id ? `https://www.youtube.com/watch?v=${id}` : "" };
            });
            const ws = XLSX.utils.json_to_sheet(rows, { header: ["Tiêu đề", "Ngày đăng", "Lượt xem", "Lượt thích", "Bình luận", "URL Video"] });
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Videos");
            const colWidths = Object.keys(rows[0]).map(key => { const maxLen = rows.reduce((mx, r) => Math.max(mx, String(r[key] || "").length), key.length); return { wch: Math.min(Math.max(maxLen + 2, 12), 80) }; });
            ws['!cols'] = colWidths;
            const today = new Date(), y = today.getFullYear(), m = String(today.getMonth() + 1).padStart(2, '0'), d = String(today.getDate()).padStart(2, '0');
            const safeTitle = (currentChannelTitle || "YouTube_Channel").replace(/[\\/:*?"<>|]/g, '_').slice(0, 60);
            XLSX.writeFile(wb, `YouTube_Videos_${safeTitle}_${y}${m}${d}.xlsx`);
        }
    </script>
</body>

</html>
