    <style>
        /* ===== SyncTune Dark Theme ===== */
        :root {
            --st-bg: #0f0f0f;
            --st-surface: #1a1a2e;
            --st-surface-2: #16213e;
            --st-accent: #22C55E;
            --st-accent-glow: rgba(34, 197, 94, 0.3);
            --st-text: #e2e8f0;
            --st-text-muted: #94a3b8;
            --st-border: #2d2d44;
            --st-danger: #ef4444;
            --st-radius: 14px;
        }

        /* Override light theme for this page */
        body {
            background: var(--st-bg) !important;
            color: var(--st-text) !important;
            font-family: 'DM Sans', sans-serif;
            margin: 0;
            min-height: 100vh;
        }

        /* Header override for dark */
        .header {
            background: rgba(15, 15, 15, 0.9) !important;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--st-border) !important;
        }

        .header .logo,
        .header .nav-link,
        .header .logo-icon {
            color: var(--st-text) !important;
        }

        .header .nav-link:hover {
            color: var(--st-accent) !important;
        }

        /* Back link */
        .st-back {
            display: inline-block;
            margin: 100px 0 0;
            padding: 0 24px;
            color: var(--st-accent);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .st-back:hover {
            opacity: 0.7;
        }

        /* ===== LOBBY ===== */
        .lobby {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 70px);
            padding: 20px;
        }

        .lobby-card {
            background: var(--st-surface);
            border: 2px solid var(--st-border);
            border-radius: 24px;
            padding: 48px;
            max-width: 440px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .lobby-logo {
            font-size: 3rem;
            margin-bottom: 8px;
        }

        .lobby-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--st-accent);
            margin-bottom: 4px;
        }

        .lobby-subtitle {
            color: var(--st-text-muted);
            font-size: 0.95rem;
            margin-bottom: 32px;
        }

        .lobby-input {
            width: 100%;
            padding: 14px 16px;
            background: var(--st-bg);
            border: 2px solid var(--st-border);
            border-radius: 12px;
            color: var(--st-text);
            font-size: 1rem;
            font-family: inherit;
            outline: none;
            margin-bottom: 12px;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        .lobby-input:focus {
            border-color: var(--st-accent);
        }

        .lobby-input::placeholder {
            color: var(--st-text-muted);
        }

        .lobby-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            margin-bottom: 10px;
        }

        .lobby-btn-primary {
            background: var(--st-accent);
            color: #fff;
        }

        .lobby-btn-primary:hover {
            background: #16a34a;
            transform: translateY(-1px);
        }

        .lobby-btn-outline {
            background: transparent;
            border: 2px solid var(--st-border);
            color: var(--st-text);
        }

        .lobby-btn-outline:hover {
            border-color: var(--st-accent);
            color: var(--st-accent);
        }

        .lobby-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: var(--st-text-muted);
            font-size: 0.85rem;
        }

        .lobby-divider::before,
        .lobby-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--st-border);
        }

        /* ===== ROOM ===== */
        .room {
            display: none;
        }

        .room.active {
            display: block;
        }

        .room-header {
            padding: 80px 24px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .room-brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .room-brand-icon {
            font-size: 1.5rem;
        }

        .room-brand-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--st-accent);
        }

        .room-info {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 0.85rem;
        }

        .room-code {
            background: var(--st-surface);
            border: 1px solid var(--st-border);
            padding: 6px 14px;
            border-radius: 100px;
            cursor: pointer;
            transition: 0.2s;
            color: var(--st-text);
        }

        .room-code:hover {
            border-color: var(--st-accent);
        }

        .room-users {
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--st-text-muted);
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: var(--st-accent);
            border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        .room-body {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 16px;
            padding: 12px 24px 24px;
            max-height: calc(100vh - 130px);
        }

        /* Left column */
        .left-col {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Player */
        .player-wrap {
            background: #000;
            border-radius: var(--st-radius);
            overflow: hidden;
            aspect-ratio: 16/9;
            position: relative;
        }

        .player-wrap iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .player-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--st-text-muted);
            gap: 12px;
        }

        .player-placeholder i {
            font-size: 3rem;
        }

        /* Add URL */
        .add-url-row {
            display: flex;
            gap: 8px;
        }

        .add-url-input {
            flex: 1;
            padding: 12px 16px;
            background: var(--st-surface);
            border: 2px solid var(--st-border);
            border-radius: 12px;
            color: var(--st-text);
            font-size: 0.9rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .add-url-input:focus {
            border-color: var(--st-accent);
        }

        .add-url-input::placeholder {
            color: var(--st-text-muted);
        }

        .add-url-btn {
            padding: 12px 20px;
            background: var(--st-accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            white-space: nowrap;
            transition: 0.2s;
        }

        .add-url-btn:hover {
            background: #16a34a;
        }

        /* Reactions row */
        .reactions-row {
            display: flex;
            gap: 6px;
            position: relative;
        }

        .reaction-btn {
            padding: 8px 14px;
            background: var(--st-surface);
            border: 1px solid var(--st-border);
            border-radius: 10px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .reaction-btn:hover {
            border-color: var(--st-accent);
            transform: scale(1.1);
        }

        /* Floating reactions */
        .floating-reaction {
            position: fixed;
            font-size: 2rem;
            animation: float-up 2s ease-out forwards;
            pointer-events: none;
            z-index: 999;
        }

        @keyframes float-up {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }

            100% {
                opacity: 0;
                transform: translateY(-200px) scale(1.5);
            }
        }

        /* Right column */
        .right-col {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: calc(100vh - 130px);
        }

        /* Queue panel */
        .panel {
            background: var(--st-surface);
            border: 1px solid var(--st-border);
            border-radius: var(--st-radius);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            padding: 14px 16px;
            border-bottom: 1px solid var(--st-border);
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-header .count {
            background: var(--st-accent);
            color: #fff;
            padding: 2px 10px;
            border-radius: 100px;
            font-size: 0.75rem;
        }

        .queue-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            min-height: 120px;
            max-height: 260px;
        }

        .queue-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }

        .queue-item:hover {
            background: var(--st-surface-2);
        }

        .queue-item.playing {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .queue-item-thumb {
            width: 48px;
            height: 36px;
            border-radius: 6px;
            object-fit: cover;
            background: var(--st-bg);
        }

        .queue-item-info {
            flex: 1;
            min-width: 0;
        }

        .queue-item-title {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .queue-item-added {
            font-size: 0.75rem;
            color: var(--st-text-muted);
        }

        .queue-item-remove {
            background: none;
            border: none;
            color: var(--st-text-muted);
            cursor: pointer;
            padding: 4px;
            font-size: 1rem;
            transition: 0.2s;
        }

        .queue-item-remove:hover {
            color: var(--st-danger);
        }

        .queue-empty {
            text-align: center;
            padding: 30px;
            color: var(--st-text-muted);
            font-size: 0.85rem;
        }

        /* Chat panel */
        .chat-panel {
            flex: 1;
            min-height: 200px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 220px;
            min-height: 150px;
        }

        .chat-msg {
            font-size: 0.83rem;
            line-height: 1.4;
            animation: fade-in 0.3s;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .chat-msg .chat-user {
            font-weight: 700;
            color: var(--st-accent);
            margin-right: 6px;
        }

        .chat-msg.system-msg {
            color: var(--st-text-muted);
            font-style: italic;
            font-size: 0.78rem;
        }

        .chat-input-row {
            display: flex;
            gap: 6px;
            padding: 10px 12px;
            border-top: 1px solid var(--st-border);
        }

        .chat-input {
            flex: 1;
            padding: 10px 12px;
            background: var(--st-bg);
            border: 1px solid var(--st-border);
            border-radius: 10px;
            color: var(--st-text);
            font-size: 0.85rem;
            font-family: inherit;
            outline: none;
        }

        .chat-input:focus {
            border-color: var(--st-accent);
        }

        .chat-send-btn {
            padding: 10px 16px;
            background: var(--st-accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
        }

        .chat-send-btn:hover {
            background: #16a34a;
        }

        /* Leave button */
        .leave-btn {
            background: none;
            border: 1px solid var(--st-danger);
            color: var(--st-danger);
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .leave-btn:hover {
            background: var(--st-danger);
            color: #fff;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .room-body {
                grid-template-columns: 1fr;
                max-height: none;
                padding: 12px 16px;
            }

            .right-col {
                max-height: none;
            }

            .lobby-card {
                padding: 32px 24px;
            }

            .room-header {
                padding: 70px 16px 8px;
            }
        }

        /* Scrollbar dark */
        .queue-list::-webkit-scrollbar,
        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }

        .queue-list::-webkit-scrollbar-track,
        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .queue-list::-webkit-scrollbar-thumb,
        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--st-border);
            border-radius: 4px;
        }

        /* Toast */
        .st-toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--st-surface);
            border: 1px solid var(--st-accent);
            color: var(--st-text);
            padding: 10px 24px;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 600;
            z-index: 9999;
            animation: toast-in 0.3s, toast-out 0.3s 2s forwards;
        }

        @keyframes toast-in {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        @keyframes toast-out {
            to {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
        }
    </style>
</head>

    <!-- YouTube IFrame API -->
    <script>
        // Load YouTube IFrame API
        const tag = document.createElement('script');
        tag.src = 'https://www.youtube.com/iframe_api';
        document.head.appendChild(tag);

        let ytPlayerReady = false;
        let ytPlayerObj = null;

        function onYouTubeIframeAPIReady() {
            ytPlayerObj = new YT.Player('ytPlayer', {
                height: '100%',
                width: '100%',
                playerVars: {
                    autoplay: 0,
                    controls: 1,
                    modestbranding: 1,
                    rel: 0,
                    fs: 1,
                },
                events: {
                    onReady: () => { ytPlayerReady = true; },
                    onStateChange: onPlayerStateChange,
                }
            });
        }

        function onPlayerStateChange(event) {
            // When video ends, play next in queue
            if (event.data === YT.PlayerState.ENDED) {
                playNext();
            }
        }
    </script>

        const usernameInput = document.getElementById('usernameInput');
        const roomCodeInput = document.getElementById('roomCodeInput');
        const roomCodeDisplay = document.getElementById('roomCodeDisplay');
        const userCountEl = document.getElementById('userCount');
        const queueListEl = document.getElementById('queueList');
        const queueCountEl = document.getElementById('queueCount');
        const urlInput = document.getElementById('urlInput');
        const chatMessagesEl = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');

        // ===== UTILITY =====
        function generateRoomCode() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = '';
            for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
            return code;
        }

        function extractVideoId(url) {
            const patterns = [
                /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/v\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/,
                /^([a-zA-Z0-9_-]{11})$/
            ];
            for (const p of patterns) {
                const m = url.match(p);
                if (m) return m[1];
            }
            return null;
        }

        function toast(msg) {
            const t = document.createElement('div');
            t.className = 'st-toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        function addSystemMessage(text) {
            const d = document.createElement('div');
            d.className = 'chat-msg system-msg';
            d.textContent = text;
            chatMessagesEl.appendChild(d);
            chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
        }

        function addChatMessage(user, text) {
            const d = document.createElement('div');
            d.className = 'chat-msg';
            d.innerHTML = `<span class="chat-user">${escHtml(user)}</span>${escHtml(text)}`;
            chatMessagesEl.appendChild(d);
            chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
        }

        function escHtml(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        // ===== ROOM MANAGEMENT =====
        function createRoom() {
            currentUser = usernameInput.value.trim() || 'Guest';
            roomCode = generateRoomCode();
            isHost = true;
            joinChannel();
        }

        function joinRoom() {
            currentUser = usernameInput.value.trim() || 'Guest';
            roomCode = roomCodeInput.value.trim().toUpperCase();
            if (roomCode.length < 4) { toast('Mã phòng không hợp lệ!'); return; }
            isHost = false;
            joinChannel();
        }

        function joinChannel() {
            // Show room UI
            lobbyEl.style.display = 'none';
            roomEl.classList.add('active');
            roomCodeDisplay.textContent = `Room: ${roomCode}`;

            // Create Supabase channel
            channel = supabase.channel(`synctune-${roomCode}`, {
                config: { broadcast: { self: true } }
            });

            // Listen for events
            channel
                .on('broadcast', { event: 'queue:add' }, ({ payload }) => {
                    onQueueAdd(payload);
                })
                .on('broadcast', { event: 'queue:remove' }, ({ payload }) => {
                    onQueueRemove(payload);
                })
                .on('broadcast', { event: 'playback:sync' }, ({ payload }) => {
                    onPlaybackSync(payload);
                })
                .on('broadcast', { event: 'playback:play' }, ({ payload }) => {
                    onPlaybackPlay(payload);
                })
                .on('broadcast', { event: 'chat:message' }, ({ payload }) => {
                    addChatMessage(payload.user, payload.text);
                })
                .on('broadcast', { event: 'reaction' }, ({ payload }) => {
                    showFloatingReaction(payload.emoji);
                })
                .on('broadcast', { event: 'user:joined' }, ({ payload }) => {
                    addSystemMessage(`${payload.username} đã tham gia phòng 🎧`);
                })
                .on('broadcast', { event: 'queue:full-sync' }, ({ payload }) => {
                    // Full queue sync for new joiners
                    queue = payload.queue || [];
                    currentIndex = payload.currentIndex;
                    renderQueue();
                    if (currentIndex >= 0 && queue[currentIndex]) {
                        loadVideo(queue[currentIndex].videoId, false);
                    }
                })
                .on('broadcast', { event: 'request:sync' }, ({ payload }) => {
                    // Host responds with full queue state
                    if (isHost) {
                        channel.send({
                            type: 'broadcast',
                            event: 'queue:full-sync',
                            payload: { queue, currentIndex }
                        });
                    }
                })
                .subscribe((status) => {
                    if (status === 'SUBSCRIBED') {
                        // Announce join
                        channel.send({
                            type: 'broadcast',
                            event: 'user:joined',
                            payload: { username: currentUser }
                        });

                        // If not host, request current queue state
                        if (!isHost) {
                            setTimeout(() => {
                                channel.send({
                                    type: 'broadcast',
                                    event: 'request:sync',
                                    payload: {}
                                });
                            }, 500);
                        }

                        addSystemMessage(isHost
                            ? `Phòng ${roomCode} đã được tạo! Chia sẻ mã này cho bạn bè.`
                            : `Đã tham gia phòng ${roomCode}`
                        );
                    }
                });
        }

        function leaveRoom() {
            if (channel) {
                supabase.removeChannel(channel);
                channel = null;
            }
            queue = [];
            currentIndex = -1;
            roomEl.classList.remove('active');
            lobbyEl.style.display = 'flex';
            chatMessagesEl.innerHTML = '';
            if (ytPlayerObj && ytPlayerReady) {
                ytPlayerObj.stopVideo();
            }
            document.getElementById('playerPlaceholder').style.display = 'flex';
        }

        // ===== QUEUE =====
        function addToQueue() {
            const url = urlInput.value.trim();
            if (!url) return;
            const videoId = extractVideoId(url);
            if (!videoId) { toast('Link YouTube không hợp lệ!'); return; }

            // Get video info via noembed
            fetch(`https://noembed.com/embed?url=https://www.youtube.com/watch?v=${videoId}`)
                .then(r => r.json())
                .then(data => {
                    const item = {
                        videoId,
                        title: data.title || `Video ${videoId}`,
                        thumbnail: `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`,
                        addedBy: currentUser
                    };

                    channel.send({
                        type: 'broadcast',
                        event: 'queue:add',
                        payload: item
                    });

                    urlInput.value = '';
                })
                .catch(() => {
                    // Fallback if noembed fails
                    const item = {
                        videoId,
                        title: `YouTube Video`,
                        thumbnail: `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`,
                        addedBy: currentUser
                    };
                    channel.send({
                        type: 'broadcast',
                        event: 'queue:add',
                        payload: item
                    });
                    urlInput.value = '';
                });
        }

        function onQueueAdd(item) {
            // Avoid duplicates
            if (queue.some(q => q.videoId === item.videoId)) return;
            queue.push(item);
            renderQueue();
            addSystemMessage(`${item.addedBy} đã thêm "${item.title}"`);

            // Auto-play first song
            if (queue.length === 1 && currentIndex === -1) {
                playAtIndex(0);
            }
        }

        function removeFromQueue(videoId) {
            channel.send({
                type: 'broadcast',
                event: 'queue:remove',
                payload: { videoId }
            });
        }

        function onQueueRemove({ videoId }) {
            const idx = queue.findIndex(q => q.videoId === videoId);
            if (idx === -1) return;
            queue.splice(idx, 1);
            if (idx < currentIndex) currentIndex--;
            else if (idx === currentIndex) {
                if (queue.length > 0) {
                    currentIndex = Math.min(currentIndex, queue.length - 1);
                    playAtIndex(currentIndex);
                } else {
                    currentIndex = -1;
                    if (ytPlayerObj && ytPlayerReady) ytPlayerObj.stopVideo();
                    document.getElementById('playerPlaceholder').style.display = 'flex';
                }
            }
            renderQueue();
        }

        function playAtIndex(idx) {
            if (idx < 0 || idx >= queue.length) return;
            currentIndex = idx;
            loadVideo(queue[idx].videoId, true);
            renderQueue();

            // Broadcast to others
            if (channel) {
                channel.send({
                    type: 'broadcast',
                    event: 'playback:play',
                    payload: { index: idx, videoId: queue[idx].videoId }
                });
            }
        }

        function onPlaybackPlay({ index, videoId }) {
            currentIndex = index;
            loadVideo(videoId, true);
            renderQueue();
        }

        function onPlaybackSync({ videoId, time, playing }) {
            if (!ytPlayerReady) return;
            const currentVid = ytPlayerObj.getVideoData?.()?.video_id;
            if (currentVid !== videoId) {
                ytPlayerObj.loadVideoById(videoId, time);
            } else {
                const diff = Math.abs(ytPlayerObj.getCurrentTime() - time);
                if (diff > 3) ytPlayerObj.seekTo(time, true);
            }
            if (playing) ytPlayerObj.playVideo();
            else ytPlayerObj.pauseVideo();
        }

        function loadVideo(videoId, autoplay) {
            if (!ytPlayerReady) return;
            document.getElementById('playerPlaceholder').style.display = 'none';
            if (autoplay) {
                ytPlayerObj.loadVideoById(videoId);
            } else {
                ytPlayerObj.cueVideoById(videoId);
            }
        }

        function playNext() {
            if (currentIndex < queue.length - 1) {
                playAtIndex(currentIndex + 1);
            }
        }

        function renderQueue() {
            queueCountEl.textContent = queue.length;
            if (queue.length === 0) {
                queueListEl.innerHTML = '<div class="queue-empty">Chưa có bài hát nào.<br>Paste link YouTube để thêm!</div>';
                return;
            }
            queueListEl.innerHTML = queue.map((item, i) => `
        <div class="queue-item ${i === currentIndex ? 'playing' : ''}" onclick="playAtIndex(${i})">
          <img class="queue-item-thumb" src="${item.thumbnail}" alt="" loading="lazy">
          <div class="queue-item-info">
            <div class="queue-item-title">${escHtml(item.title)}</div>
            <div class="queue-item-added">${i === currentIndex ? '▶ Đang phát' : `Bởi ${escHtml(item.addedBy)}`}</div>
          </div>
          <button class="queue-item-remove" onclick="event.stopPropagation();removeFromQueue('${item.videoId}')" title="Xóa">✕</button>
        </div>
      `).join('');
        }

        // ===== CHAT =====
        function sendChat() {
            const text = chatInput.value.trim();
            if (!text || !channel) return;
            channel.send({
                type: 'broadcast',
                event: 'chat:message',
                payload: { user: currentUser, text }
            });
            chatInput.value = '';
        }

        // ===== REACTIONS =====
        function showFloatingReaction(emoji) {
            const el = document.createElement('div');
            el.className = 'floating-reaction';
            el.textContent = emoji;
            el.style.left = (Math.random() * 60 + 20) + '%';
            el.style.bottom = '20%';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 2100);
        }

        function sendReaction(emoji) {
            if (!channel) return;
            channel.send({
                type: 'broadcast',
                event: 'reaction',
                payload: { emoji }
            });
        }

        // ===== EVENT LISTENERS =====
        document.getElementById('createRoomBtn').addEventListener('click', createRoom);
        document.getElementById('joinRoomBtn').addEventListener('click', joinRoom);
        document.getElementById('leaveBtn').addEventListener('click', leaveRoom);
        document.getElementById('addUrlBtn').addEventListener('click', addToQueue);
        document.getElementById('chatSendBtn').addEventListener('click', sendChat);

        // Enter key handlers
        usernameInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') createRoom();
        });
        roomCodeInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') joinRoom();
        });
        urlInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') addToQueue();
        });
        chatInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') sendChat();
        });

        // Reactions
        document.querySelectorAll('.reaction-btn').forEach(btn => {
            btn.addEventListener('click', () => sendReaction(btn.dataset.emoji));
        });

        // Copy room code
        roomCodeDisplay.addEventListener('click', () => {
            navigator.clipboard.writeText(roomCode).then(() => toast('Đã copy mã phòng!'));
        });

        // Check URL params for room code
        const urlParams = new URLSearchParams(window.location.search);
        const paramRoom = urlParams.get('room');
        if (paramRoom) {
            roomCodeInput.value = paramRoom.toUpperCase();
        }

        // Periodic sync (host sends playback state every 5s)
        setInterval(() => {
            if (!isHost || !channel || !ytPlayerReady || currentIndex < 0) return;
            const state = ytPlayerObj.getPlayerState?.();
            if (state === undefined) return;
            channel.send({
                type: 'broadcast',
                event: 'playback:sync',
                payload: {
                    videoId: queue[currentIndex]?.videoId,
                    time: ytPlayerObj.getCurrentTime(),
                    playing: state === YT.PlayerState.PLAYING,
                }
            });
        }, 5000);
    </script>
</body>

</html>
