<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>AI Gợi ý Vị trí Đặt quảng cáo GDN (Nâng cao)</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; line-height: 1.6; padding: 20px; max-width: 900px; margin: auto; color: #333; }
        .container { background-color: #fff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #4285F4; }
        .controls { display: flex; gap: 10px; align-items: center; }
        input[type="text"] { flex-grow: 1; padding: 10px; font-size: 1em; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 18px; cursor: pointer; background-color: #34A853; color: white; border: none; border-radius: 4px; font-weight: bold; }
        button:hover { background-color: #2c8e45; }
        #status { margin-top: 15px; font-size: 0.95em; color: #555; min-height: 24px; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #4285F4; border-radius: 50%; width: 16px; height: 16px; display: inline-block; vertical-align: middle; animation: spin 1s linear infinite; margin-right: 6px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #results { margin-top: 20px; padding: 15px; border: 1px solid #eee; border-radius: 8px; background-color: #f9f9f9; }
        #results table { width: 100%; border-collapse: collapse; }
        #results th, #results td { border: 1px solid #ddd; padding: 8px; }
        #results th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 AI Gợi ý Vị trí Đặt quảng cáo GDN (Nâng cao)</h1>
        <p>Nhập URL trang đích của bạn, AI sẽ phân tích sản phẩm và đề xuất các trang web quảng cáo phù hợp nhất từ danh sách dữ liệu có sẵn.</p>
        
        <div class="controls">
            <input type="text" id="landingPageUrl" placeholder="https://www.example.com/san-pham-cua-ban">
            <button onclick="analyzeAndSuggest()">Phân tích</button>
        </div>

        <div id="status"></div>
        <div id="results"></div>
    </div>

    <script>
        // CẢNH BÁO: KHÔNG ĐƯA KEY NÀY LÊN WEBSITE CÔNG KHAI
        const GEMINI_API_KEY = 'AIzaSyDzzWNOmeZHzYUk-ve14wpNGA5VVO6gX2c';
        const CORS_PROXY = 'https://cors.eu.org/';

        const websiteList = [
             "cafef.vn", "soha.vn", "nld.com.vn", "kenh14.vn", "cafebiz.vn", "f319.com", "vtv.vn", "subdomain.nld.com.vn", "thanhnien.vn", "tuoitre.vn", "kinhtechungkhoan.vn", "baodautu.vn", "bizlive.vn", "nhipcaudautu.vn", "laodong.vn", "tinnhanhchungkhoan.vn", "vietnamnet.vn", "phunuvietnam.vn", "viettimes.vn", "kinhtedothi.vn", "bnews.vn", "cungcau.vn", "tapchitaichinh.vn", "vietnambiz.vn", "dautuvietnam.com.vn", "nhipsongkinhte.toquoc.vn", "nhipsongviet.toquoc.vn", "doanhnghieptiepthi.vn", "kienthuckinhte.vn", "doanhnghiep.kinhtechungkhoan.vn", "doanhnhanvn.vn", "nguoiquansat.vn", "doanhnghiepkinhdoanh.doanhnhanvn.vn", "nhipsongkinhdoanh.vn", "vietnamfinance.vn", "doanhnghiepkinhdoanh", "batdongsan.com.vn", "1thegioi.vn", "24h.com.vn", "afamily.vn", "autopro.com.vn", "baodautu.vn", "baomoi.com", "baoquocte.vn", "baotintuc.vn", "baotonghop.vn", "batdongsan.com.vn", "bizlive.vn", "blogdoanhnhan.org", "bnews.vn", "cafebiz.vn", "cafef.vn", "cungcau.vn", "danviet.vn", "dautuvietnam.com.vn", "doanhnghieptiepthi.vn", "f319.com", "genk.vn", "kenh14.vn", "kienthuc.net.vn", "kienthuckinhte.vn", "kinhtedothi.vn", "laodong.vn", "nguoiquansat.vn", "nhipcaudautu.vn", "nhipsongkinhdoanh.vn", "nhipsongkinhte.toquoc.vn", "nld.com.vn", "otofun.net", "otosaigon.com", "soha.vn", "sukien24h.vn", "tapchitaichinh.vn", "thanhnien.vn", "tienphong.vn", "tiepthitieudung.com", "tinnhanhchungkhoan.vn", "tintuc.vn", "tuoitre.vn", "vietnambiz.vn", "vietnammoi.vn", "vietnamnet.vn", "vietnamnews.vn", "vietnamplus.vn", "viettimes.vn", "vtv.vn"
        ];

        function setStatus(message, loading = false) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = loading ? `<span class="spinner"></span>${message}` : message;
        }

        async function analyzeAndSuggest() {
            const landingPageUrl = document.getElementById('landingPageUrl').value.trim();
            if (GEMINI_API_KEY === 'DÁN_GEMINI_API_KEY_CUA_BAN_VAO_DAY') {
                setStatus('Lỗi: Vui lòng thay thế Gemini API Key trong mã nguồn.', false);
                return;
            }
            if (!landingPageUrl) {
                setStatus('Vui lòng nhập URL trang đích.', false);
                return;
            }

            setStatus('Đang đọc nội dung trang đích...', true);
            document.getElementById('results').innerHTML = '';

            try {
                const proxiedUrl = `${CORS_PROXY}${landingPageUrl}`;
                const response = await fetch(proxiedUrl);
                if (!response.ok) throw new Error('Không thể đọc được nội dung từ URL đã cho.');
                
                const html = await response.text();
                const pageText = stripHtml(html);

                setStatus('Đã lấy được nội dung. Đang gửi cho AI phân tích...', true);

                // *** PROMPT ĐÃ ĐƯỢC NÂNG CẤP ĐỂ CHO RA KẾT QUẢ TOÀN DIỆN HƠN ***
                const prompt = `
                1. VAI TRÒ:
                Hãy đóng vai một Giám đốc Kế hoạch Truyền thông (Media Planning Director) với 15 năm kinh nghiệm, chuyên sâu về các chiến dịch quảng cáo hiển thị.

                2. BỐI CẢNH:
                Tôi có một danh sách các trang web tiềm năng để đặt quảng cáo Google Display Network (GDN) tại Việt Nam và một trang đích cho sản phẩm của mình. Nhiệm vụ của bạn là giúp tôi xây dựng một kế hoạch vị trí đặt quảng cáo toàn diện.

                3. DỮ LIỆU ĐẦU VÀO:
                - DANH SÁCH WEBSITE TIỀM NĂNG: ${websiteList.join(', ')}.
                - NỘI DUNG TÓM TẮT CỦA TRANG ĐÍCH: "${pageText.substring(0, 3000)}..."

                4. YÊU CẦU:
                Dựa trên nội dung của trang đích, hãy thực hiện các việc sau:
                - Phân tích kỹ lưỡng sản phẩm và đối tượng khách hàng mục tiêu.
                - Đánh giá TOÀN BỘ "DANH SÁCH WEBSITE TIỀM NĂNG".
                - Chọn ra TẤT CẢ các trang web bạn cho là phù hợp để chạy quảng cáo, không giới hạn số lượng.
                - Với mỗi trang web được đề xuất, hãy cho biết loại hình chiến dịch hoặc mục tiêu phù hợp nhất (ví dụ: "Nâng cao nhận diện thương hiệu", "Tiếp cận khách hàng cân nhắc", "Thu hút traffic chất lượng", "Tiếp thị lại cho khách cũ").

                5. ĐỊNH DẠNG ĐẦU RA:
                Trình bày kết quả bằng tiếng Việt dưới dạng bảng Markdown với các cột sau:
                | Trang Web Đề Xuất | Lý Do Lựa Chọn | Loại Hình Chiến Dịch Phù Hợp |
                |---|---|---|
                `;

                const geminiResponse = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        "contents": [{ "parts": [{ "text": prompt }] }]
                    })
                });

                if (!geminiResponse.ok) throw new Error('Yêu cầu đến API Gemini thất bại.');

                const data = await geminiResponse.json();
                const aiResponseText = data.candidates[0].content.parts[0].text;
                
                document.getElementById('results').innerHTML = marked.parse(aiResponseText);
                setStatus('AI đã hoàn thành phân tích và đề xuất!', false);

            } catch (error) {
                console.error("Lỗi:", error);
                setStatus(error.message, false);
            }
        }

        function stripHtml(html) {
            const doc = new DOMParser().parseFromString(html, 'text/html');
            const mainContent = doc.querySelector('main') || doc.querySelector('article') || doc.body;
            mainContent.querySelectorAll('script, style, nav, footer, header').forEach(el => el.remove());
            return mainContent.textContent.replace(/\s\s+/g, ' ').trim();
        }
    </script>
</body>
</html>
