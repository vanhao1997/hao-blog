<!DOCTYPE html>
<html lang="vi" data-theme="light">

<head>
    <script src="/js/tracking.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Gợi ý Vị trí Đặt quảng cáo GDN - Nguyễn Văn Hảo</title>
    <meta name="description" content="AI phân tích sản phẩm và đề xuất vị trí đặt quảng cáo GDN phù hợp nhất">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2322C55E'/%3E%3Ctext x='50' y='70' font-family='Arial Black' font-size='60' font-weight='bold' fill='white' text-anchor='middle'%3EH%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/main.css?v=1.4">
    <link rel="stylesheet" href="/css/style.css?v=1.5">
    <link rel="stylesheet" href="/css/toolkit.css?v=20260323">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        #results table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
        }

        #results th,
        #results td {
            border: 1px solid var(--color-border);
            padding: 10px 14px;
            font-size: 0.9rem;
        }

        #results th {
            background: var(--color-bg, #f8fafc);
            font-weight: 700;
        }

        #results tbody tr:hover {
            background: #f0fdf4;
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="container header-inner">
            <a href="/" class="logo"><span class="logo-icon">H</span><span class="hide-mobile">Nguyễn Văn Hảo</span></a>
            <nav class="nav">
                <button class="menu-toggle" id="menuToggle"
                    aria-label="Menu"><span></span><span></span><span></span></button>
                <ul class="nav-list" id="navList">
                    <li><a href="/" class="nav-link">Trang chủ</a></li>
                    <li><a href="/blog" class="nav-link">Blog</a></li>
                    <li><a href="/gioi-thieu" class="nav-link">Giới thiệu</a></li>
                    <li><a href="/lien-he" class="nav-link">Liên hệ</a></li>
                    <li><a href="/toolkit/" class="nav-link">Công cụ</a></li>
                </ul>
                <a href="/lien-he" class="btn btn-primary hide-mobile">Liên hệ ngay</a>
            </nav>
        </div>
    </header>

    <section class="calc-page">
        <div class="container">
            <a href="/toolkit/" class="back-link">← Quay lại Toolkit</a>
            <div class="calc-header">
                <span class="section-badge"
                    style="background:var(--color-lavender);margin-bottom:12px;display:inline-block;">🤖 AI Tool</span>
                <h1>AI Gợi ý Vị trí GDN</h1>
                <p>Nhập URL trang đích, AI sẽ phân tích sản phẩm và đề xuất các trang web quảng cáo phù hợp nhất</p>
            </div>

            <div class="calc-grid">
                <!-- Input -->
                <div class="calc-card full-width">
                    <h2>🔍 Nhập URL trang đích</h2>
                    <div class="input-group">
                        <label>URL trang đích sản phẩm</label>
                        <input type="text" id="landingPageUrl" placeholder="https://www.example.com/san-pham-cua-ban">
                    </div>
                    <button class="btn-calc" onclick="analyzeAndSuggest()">Phân tích</button>
                    <div id="status" style="margin-top:12px;font-size:0.9rem;color:var(--color-gray);min-height:20px;">
                    </div>
                </div>

                <!-- Results -->
                <div class="calc-card full-width" id="results"></div>
            </div>
        </div>
    </section>

    <script src="/js/main.js?v=1.4"></script>
    <script>
        const GEMINI_API_KEY = 'AIzaSyDzzWNOmeZHzYUk-ve14wpNGA5VVO6gX2c';
        const CORS_PROXY = 'https://cors.eu.org/';

        const websiteList = [
            "cafef.vn", "soha.vn", "nld.com.vn", "kenh14.vn", "cafebiz.vn", "f319.com", "vtv.vn", "subdomain.nld.com.vn", "thanhnien.vn", "tuoitre.vn", "kinhtechungkhoan.vn", "baodautu.vn", "bizlive.vn", "nhipcaudautu.vn", "laodong.vn", "tinnhanhchungkhoan.vn", "vietnamnet.vn", "phunuvietnam.vn", "viettimes.vn", "kinhtedothi.vn", "bnews.vn", "cungcau.vn", "tapchitaichinh.vn", "vietnambiz.vn", "dautuvietnam.com.vn", "nhipsongkinhte.toquoc.vn", "nhipsongviet.toquoc.vn", "doanhnghieptiepthi.vn", "kienthuckinhte.vn", "doanhnghiep.kinhtechungkhoan.vn", "doanhnhanvn.vn", "nguoiquansat.vn", "doanhnghiepkinhdoanh.doanhnhanvn.vn", "nhipsongkinhdoanh.vn", "vietnamfinance.vn", "doanhnghiepkinhdoanh", "batdongsan.com.vn", "1thegioi.vn", "24h.com.vn", "afamily.vn", "autopro.com.vn", "baodautu.vn", "baomoi.com", "baoquocte.vn", "baotintuc.vn", "baotonghop.vn", "batdongsan.com.vn", "bizlive.vn", "blogdoanhnhan.org", "bnews.vn", "cafebiz.vn", "cafef.vn", "cungcau.vn", "danviet.vn", "dautuvietnam.com.vn", "doanhnghieptiepthi.vn", "f319.com", "genk.vn", "kenh14.vn", "kienthuc.net.vn", "kienthuckinhte.vn", "kinhtedothi.vn", "laodong.vn", "nguoiquansat.vn", "nhipcaudautu.vn", "nhipsongkinhdoanh.vn", "nhipsongkinhte.toquoc.vn", "nld.com.vn", "otofun.net", "otosaigon.com", "soha.vn", "sukien24h.vn", "tapchitaichinh.vn", "thanhnien.vn", "tienphong.vn", "tiepthitieudung.com", "tinnhanhchungkhoan.vn", "tintuc.vn", "tuoitre.vn", "vietnambiz.vn", "vietnammoi.vn", "vietnamnet.vn", "vietnamnews.vn", "vietnamplus.vn", "viettimes.vn", "vtv.vn"
        ];

        function setStatus(message, loading = false) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = loading ? `<span class="tool-spinner"></span>${message}` : message;
        }

        async function analyzeAndSuggest() {
            const landingPageUrl = document.getElementById('landingPageUrl').value.trim();
            if (!landingPageUrl) { setStatus('Vui lòng nhập URL trang đích.', false); return; }

            setStatus('Đang đọc nội dung trang đích...', true);
            document.getElementById('results').innerHTML = '';

            try {
                const proxiedUrl = `${CORS_PROXY}${landingPageUrl}`;
                const response = await fetch(proxiedUrl);
                if (!response.ok) throw new Error('Không thể đọc được nội dung từ URL đã cho.');

                const html = await response.text();
                const pageText = stripHtml(html);

                setStatus('Đã lấy được nội dung. Đang gửi cho AI phân tích...', true);

                const prompt = `
                1. VAI TRÒ: Hãy đóng vai một Giám đốc Kế hoạch Truyền thông (Media Planning Director) với 15 năm kinh nghiệm.
                2. BỐI CẢNH: Tôi có một danh sách các trang web tiềm năng để đặt quảng cáo Google Display Network (GDN) tại Việt Nam.
                3. DỮ LIỆU ĐẦU VÀO:
                - DANH SÁCH WEBSITE TIỀM NĂNG: ${websiteList.join(', ')}.
                - NỘI DUNG TÓM TẮT CỦA TRANG ĐÍCH: "${pageText.substring(0, 3000)}..."
                4. YÊU CẦU: Phân tích kỹ lưỡng sản phẩm và đối tượng khách hàng mục tiêu. Đánh giá TOÀN BỘ danh sách, chọn ra TẤT CẢ các trang web phù hợp.
                5. ĐỊNH DẠNG ĐẦU RA: Bảng Markdown:
                | Trang Web Đề Xuất | Lý Do Lựa Chọn | Loại Hình Chiến Dịch Phù Hợp |
                |---|---|---|
                `;

                const geminiResponse = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ "contents": [{ "parts": [{ "text": prompt }] }] })
                });

                if (!geminiResponse.ok) throw new Error('Yêu cầu đến API Gemini thất bại.');

                const data = await geminiResponse.json();
                const aiResponseText = data.candidates[0].content.parts[0].text;

                document.getElementById('results').innerHTML = '<h2>📊 Kết quả phân tích</h2>' + marked.parse(aiResponseText);
                setStatus('AI đã hoàn thành phân tích và đề xuất!', false);

            } catch (error) {
                console.error("Lỗi:", error);
                setStatus(error.message, false);
            }
        }

        function stripHtml(html) {
            const doc = new DOMParser().parseFromString(html, 'text/html');
            const mainContent = doc.querySelector('main') || doc.querySelector('article') || doc.body;
            mainContent.querySelectorAll('script, style, nav, footer, header').forEach(el => el.remove());
            return mainContent.textContent.replace(/\s\s+/g, ' ').trim();
        }
    </script>
</body>

</html>
