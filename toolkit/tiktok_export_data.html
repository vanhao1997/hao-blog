    <div id="results-container" class="mt-8 bg-white rounded-2xl shadow-lg p-6 sm:p-8 hidden">

  <script>
    let currentVideoStats = [];
    let currentUsername = "";
    let currentTab = 'channel';

    const APIFY_LIMITS_URL = 'https://api.apify.com/v2/users/me/limits';
    const APIFY_PROFILE_ACTOR_ENDPOINT = `https://api.apify.com/v2/acts/clockworks~tiktok-scraper/run-sync-get-dataset-items`;
    const APIFY_VIDEO_ACTOR_ENDPOINT = `https://api.apify.com/v2/acts/clockworks~tiktok-video-scraper/run-sync-get-dataset-items`;

    const statusEl = document.getElementById('status');
    const statusUrlsEl = document.getElementById('status-urls');
    const resultsContainerEl = document.getElementById('results-container');
    const profileInfoEl = document.getElementById('profile-info');
    const videoListEl = document.getElementById('video-list');
    const fetchBtn = document.getElementById('fetch-btn');
    const fetchBtnUrls = document.getElementById('fetch-btn-urls');
    const downloadBtn = document.getElementById('download-btn');
    const downloadBtnUrls = document.getElementById('download-btn-urls');

    function switchTab(tab) {
      currentTab = tab;
      const btnChannel = document.getElementById('tab-channel');
      const btnUrls = document.getElementById('tab-urls');
      const panelChannel = document.getElementById('panel-channel');
      const panelUrls = document.getElementById('panel-urls');
      if (tab === 'channel') {
        btnChannel.classList.add('tab-btn-active'); btnChannel.classList.remove('tab-btn-inactive');
        btnUrls.classList.add('tab-btn-inactive'); btnUrls.classList.remove('tab-btn-active');
        panelChannel.classList.remove('hidden'); panelUrls.classList.add('hidden');
      } else {
        btnUrls.classList.add('tab-btn-active'); btnUrls.classList.remove('tab-btn-inactive');
        btnChannel.classList.add('tab-btn-inactive'); btnChannel.classList.remove('tab-btn-active');
        panelUrls.classList.remove('hidden'); panelChannel.classList.add('hidden');
      }
    }

    // --- UTILITY FUNCTIONS ---
    function getApifyToken() { return document.getElementById('tokenSelect').value.trim(); }

    function setStatus(msg, loading = false, scope = 'channel') {
      const el = scope === 'urls' ? statusUrlsEl : statusEl;
      const btn = scope === 'urls' ? fetchBtnUrls : fetchBtn;
      if (!el) return;
      el.innerHTML = loading ? `<span class="spinner h-5 w-5 border-2 border-t-transparent border-blue-500 rounded-full mr-2"></span> ${msg}` : msg;
      if (btn) btn.disabled = loading;
      if (!loading && btn && scope === 'channel') btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg> Lấy Dữ Liệu theo kênh`;
      if (!loading && btn && scope === 'urls') btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg> Lấy Dữ Liệu theo danh sách link`;
    }

    // ====== Cập nhật credit cho TẤT CẢ option + TỰ ĐỘNG CHỌN option có credit cao nhất ======
    async function updateTokenOptions() {
      const select = document.getElementById('tokenSelect');
      if (!select) return;

      for (let i = 0; i < select.options.length; i++) {
        const opt = select.options[i];
        if (!opt.dataset.baseLabel) opt.dataset.baseLabel = opt.textContent.trim();
      }

      let bestIndex = -1;
      let bestRemain = -Infinity;

      for (let i = 0; i < select.options.length; i++) {
        const opt = select.options[i];
        const token = opt.value;
        if (!token) continue;

        try {
          const headers = new Headers({ 'Accept': 'application/json', 'Authorization': 'Bearer ' + token });
          const resp = await fetch(APIFY_LIMITS_URL, { method: 'GET', headers });
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const json = await resp.json();
          const data = json?.data || {};
          const max = Number(data?.limits?.maxMonthlyUsageUsd ?? 0);
          const used = Number(data?.current?.monthlyUsageUsd ?? 0);
          const remain = max - used;

          opt.classList.remove('text-red-600', 'font-bold', 'text-gray-400');

          if (Number.isFinite(remain) && remain > 0) {
            opt.textContent = `${opt.dataset.baseLabel} — còn $${remain.toFixed(2)}`;
            if (remain > bestRemain) { bestRemain = remain; bestIndex = i; }
            opt.dataset.remain = remain;
          } else if (Number.isFinite(remain) && remain <= 0) {
            opt.textContent = `${opt.dataset.baseLabel} — HẾT TIỀN`;
            opt.classList.add('text-red-600', 'font-bold');
            opt.dataset.remain = 0;
          } else {
            opt.textContent = `${opt.dataset.baseLabel} — không xác định`;
            opt.classList.add('text-gray-400');
            opt.dataset.remain = '';
          }
        } catch (e) {
          console.error("Không lấy được credit:", e.message);
          opt.textContent = `${opt.dataset.baseLabel} — Lỗi cần kiểm tra`;
          opt.classList.add('text-gray-400');
          opt.dataset.remain = '';
        }
      }

      if (bestIndex > -1 && bestRemain > 0) {
        select.selectedIndex = bestIndex;
      }
    }

    // ====== Hiển thị credit còn lại của option đang chọn (bên dưới dropdown) ======
    async function fetchApifyLimitsAndRender() {
      const el = document.getElementById('apify-balance');
      if (!el) return;
      const token = getApifyToken();
      if (!token) { el.textContent = 'Vui lòng chọn Option.'; return; }

      el.textContent = 'Đang kiểm tra credit còn lại...';
      try {
        const headers = new Headers({ 'Accept': 'application/json', 'Authorization': 'Bearer ' + token });
        const resp = await fetch(APIFY_LIMITS_URL, { method: 'GET', headers });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const json = await resp.json();
        const data = json?.data || {};
        const max = Number(data?.limits?.maxMonthlyUsageUsd ?? NaN);
        const used = Number(data?.current?.monthlyUsageUsd ?? NaN);
        const remain = (Number.isFinite(max) && Number.isFinite(used)) ? (max - used) : null;
        const remainTxt = (typeof remain === 'number') ? `$${remain.toFixed(2)} USD` : '—';
        el.innerHTML = `<div class="text-green-600 font-bold">Credit còn lại: ${remainTxt}</div>`;
      } catch (e) {
        el.innerHTML = `<div class="text-red-600 font-bold">Không lấy được credit: ${e.message}</div>`;
      }
    }

    // ====== Khởi tạo: cập nhật option + tự chọn option tốt nhất + render credit của option đã chọn ======
    document.addEventListener('DOMContentLoaded', async () => {
      await updateTokenOptions();
      await fetchApifyLimitsAndRender();
      document.getElementById('tokenSelect')?.addEventListener('change', fetchApifyLimitsAndRender);
    });

    // --- DATA FETCH: BY CHANNEL ---
    async function fetchTikTokData() {
      const username = document.getElementById('usernameInput').value.trim();
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;
      const token = getApifyToken();

      if (!token) { setStatus('Vui lòng chọn một Option API.', false, 'channel'); return; }
      if (!username) { setStatus('Vui lòng nhập tên tài khoản.', false, 'channel'); return; }

      currentUsername = username;
      setStatus('Đang lọc dữ liệu theo kênh...', true, 'channel');
      resultsContainerEl.classList.add('hidden'); profileInfoEl.innerHTML = ''; videoListEl.innerHTML = '';
      downloadBtn.disabled = true; downloadBtnUrls.disabled = true;

      try {
        const response = await fetch(`${APIFY_PROFILE_ACTOR_ENDPOINT}?token=${token}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ "profiles": [username], "resultsPerPage": 200, "shouldDownloadVideos": false })
        });
        if (!response.ok) {
          const errorData = await response.json().catch(() => ({ error: { message: 'Lỗi không xác định' } }));
          throw new Error(`API Apify: ${errorData.error.message}`);
        }
        const data = await response.json();
        if (!data || data.length === 0) throw new Error('API không trả về dữ liệu. Tên người dùng có thể không chính xác.');

        const profileData = mapProfileData(data[0]);
        const videoData = mapVideoData(data);

        displayProfileInfo(profileData);
        displayVideoTable(videoData, startDate, endDate);
        setStatus(`Hoàn thành. Tìm thấy ${videoData.length} video (trước khi lọc).`, false, 'channel');
        fetchApifyLimitsAndRender();
      } catch (err) {
        console.error(err);
        setStatus(`Lỗi: ${err.message}`, false, 'channel');
      }
    }

    // --- DATA FETCH: BY URL LIST ---
    async function fetchTikTokByUrls() {
      const urls = document.getElementById('videoUrls').value.split('\n').map(u => u.trim()).filter(Boolean);
      const token = getApifyToken();

      if (!token) { setStatus('Vui lòng chọn một Option API.', false, 'urls'); return; }
      if (!urls.length) { setStatus('Vui lòng nhập ít nhất 1 link video.', false, 'urls'); return; }

      currentUsername = 'URL_List';
      setStatus('Đang lấy dữ liệu theo danh sách link...', true, 'urls');
      resultsContainerEl.classList.add('hidden'); profileInfoEl.innerHTML = ''; videoListEl.innerHTML = '';
      downloadBtn.disabled = true; downloadBtnUrls.disabled = true;

      try {
        const response = await fetch(`${APIFY_VIDEO_ACTOR_ENDPOINT}?token=${token}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ "postURLs": urls, "shouldDownloadCovers": false, "shouldDownloadSlideshowImages": false, "shouldDownloadSubtitles": false, "shouldDownloadVideos": false })
        });
        if (!response.ok) throw new Error('API lỗi khi gọi theo link.');
        const data = await response.json();
        if (!data || data.length === 0) throw new Error('Không lấy được dữ liệu từ link.');

        const videoData = mapVideoData(data);
        profileInfoEl.innerHTML = '';
        displayVideoTable(videoData, null, null);
        setStatus(`Hoàn thành. Lấy được ${videoData.length} video từ danh sách link.`, false, 'urls');
        fetchApifyLimitsAndRender();
      } catch (err) {
        console.error(err);
        setStatus(`Lỗi: ${err.message}`, false, 'urls');
      }
    }

    // --- DATA MAPPING ---
    function mapProfileData(firstVideo) {
      return {
        avatarUrl: firstVideo.authorMeta?.avatar,
        nickname: firstVideo.authorMeta?.nickName,
        uniqueId: firstVideo.authorMeta?.name,
        followerCount: firstVideo.authorMeta?.fans,
        followingCount: firstVideo.authorMeta?.following,
        heartCount: firstVideo.authorMeta?.heart,
        videoCount: firstVideo.authorMeta?.video,
      };
    }

    function mapVideoData(videos) {
      return videos.map(v => ({
        authorName: v.authorMeta?.name,
        desc: v.text,
        created: new Date(v.createTimeISO || (v.createTime * 1000)),
        playCount: v.playCount || 0,
        likeCount: v.diggCount || 0,
        commentCount: v.commentCount || 0,
        shareCount: v.shareCount || 0,
        saveCount: v.collectCount || 0,
        url: v.webVideoUrl || `https://www.tiktok.com/@${v.authorMeta?.name}/video/${v.id}`
      }));
    }

    // --- UI RENDERING ---
    function displayProfileInfo(profile) {
      if (!profile?.uniqueId) { profileInfoEl.innerHTML = ''; return; }
      const fmt = new Intl.NumberFormat('vi-VN');
      profileInfoEl.innerHTML = `
      <h2 class="text-2xl font-bold text-gray-900 mb-4">Thông tin Kênh</h2>
      <div class="flex items-center gap-4 sm:gap-6 border border-gray-200 bg-gray-50 p-4 rounded-lg mb-8">
        <img src="${profile.avatarUrl}" alt="Avatar" class="w-20 h-20 sm:w-24 sm:h-24 object-cover rounded-full border-2 border-white shadow-md">
        <div>
          <h3 class="text-xl font-bold text-gray-800">${profile.nickname || ''}</h3>
          <p class="text-md text-gray-600">@${profile.uniqueId || ''}</p>
          <div class="mt-2 flex flex-wrap gap-x-4 gap-y-1 text-sm text-gray-700">
            <span><strong>${fmt.format(profile.followerCount || 0)}</strong> Followers</span>
            <span><strong>${fmt.format(profile.followingCount || 0)}</strong> Following</span>
            <span><strong>${fmt.format(profile.heartCount || 0)}</strong> Thích</span>
            <span><strong>${fmt.format(profile.videoCount || 0)}</strong> Videos</span>
          </div>
        </div>
      </div>`;
    }

    function displayVideoTable(videos, startDate, endDate) {
      let filteredVideos = videos;
      if (currentTab === 'channel' && (startDate || endDate)) {
        const start = startDate ? new Date(startDate) : null;
        if (start) start.setHours(0, 0, 0, 0);

        const end = endDate ? new Date(endDate) : null;
        if (end) end.setHours(23, 59, 59, 999);

        filteredVideos = videos.filter(video => {
          const publishedDate = video.created;
          const isAfterStart = start ? publishedDate >= start : true;
          const isBeforeEnd = end ? publishedDate <= end : true;
          return isAfterStart && isBeforeEnd;
        });
      }

      currentVideoStats = filteredVideos;

      if (filteredVideos.length === 0) {
        videoListEl.innerHTML = `<h3 class="text-xl font-bold text-gray-900 mb-4">Danh sách Video</h3><p class="text-center text-gray-500 py-8">Không có video nào trong khoảng thời gian đã chọn.</p>`;
        resultsContainerEl.classList.remove('hidden');
        return;
      }

      if (currentTab === 'channel') { downloadBtn.disabled = false; }
      else { downloadBtnUrls.disabled = false; }

      const fmt = new Intl.NumberFormat('vi-VN');
      let html = `
      <h3 class="text-xl font-bold text-gray-900 mb-4">Danh sách Video (${filteredVideos.length})</h3>
      <table class="w-full text-sm text-left text-gray-600 border border-gray-200">
        <thead class="bg-gray-100">
          <tr>
            <th class="px-3 py-2 border">Tài khoản Tiktok</th>
            <th class="px-3 py-2 border">Nội dung</th>
            <th class="px-3 py-2 border">Ngày đăng</th>
            <th class="px-3 py-2 border">Lượt xem</th>
            <th class="px-3 py-2 border">Thích</th>
            <th class="px-3 py-2 border">Bình luận</th>
            <th class="px-3 py-2 border">Lượt chia sẻ</th>
            <th class="px-3 py-2 border">Lượt lưu</th>
          </tr>
        </thead>
        <tbody>`;

      for (const v of filteredVideos) {
        html += `
        <tr class="hover:bg-gray-50">
          <td class="px-3 py-2 border align-top">${v.authorName || 'N/A'}</td>
          <td class="px-3 py-2 border align-top" title="${v.desc}"><a href="${v.url}" target="_blank" class="hover:text-blue-600 hover:underline">${(v.desc || '').slice(0, 40)}${(v.desc || '').length > 40 ? '…' : ''}</a></td>
          <td class="px-3 py-2 border align-top">${v.created.toLocaleDateString('vi-VN')}</td>
          <td class="px-3 py-2 border align-top">${fmt.format(v.playCount)}</td>
          <td class="px-3 py-2 border align-top">${fmt.format(v.likeCount)}</td>
          <td class="px-3 py-2 border align-top">${fmt.format(v.commentCount)}</td>
          <td class="px-3 py-2 border align-top">${fmt.format(v.shareCount)}</td>
          <td class="px-3 py-2 border align-top">${fmt.format(v.saveCount)}</td>
        </tr>`;
      }
      html += `</tbody>
        <tfoot class="bg-gray-50">
            <tr>
                <td class="p-2 text-center border"><button class="copy-btn" onclick="copyColumnData('authorName', this)">📋 Copy</button></td>
                <td class="p-2 text-center border"><button class="copy-btn" onclick="copyColumnData('desc', this)">📋 Copy</button></td>
                <td class="p-2 text-center border"><button class="copy-btn" onclick="copyColumnData('created', this)">📋 Copy</button></td>
                <td class="p-2 text-center border"><button class="copy-btn" onclick="copyColumnData('playCount', this)">📋 Copy</button></td>
                <td class="p-2 text-center border"><button class="copy-btn" onclick="copyColumnData('likeCount', this)">📋 Copy</button></td>
                <td class="p-2 text-center border"><button class="copy-btn" onclick="copyColumnData('commentCount', this)">📋 Copy</button></td>
                <td class="p-2 text-center border"><button class="copy-btn" onclick="copyColumnData('shareCount', this)">📋 Copy</button></td>
                <td class="p-2 text-center border"><button class="copy-btn" onclick="copyColumnData('saveCount', this)">📋 Copy</button></td>
            </tr>
        </tfoot>
    </table>`;
      videoListEl.innerHTML = html;
      resultsContainerEl.classList.remove('hidden');
    }

    // --- COPY FUNCTION ---
    async function copyColumnData(key, buttonEl) {
      if (!currentVideoStats || currentVideoStats.length === 0) return;

      const columnData = currentVideoStats.map(item => {
        const value = item[key];
        if (value instanceof Date) {
          return value.toLocaleDateString('vi-VN');
        }
        return value !== undefined ? value : '';
      }).join('\n');

      try {
        await navigator.clipboard.writeText(columnData);
        const originalText = buttonEl.innerHTML;
        buttonEl.innerHTML = 'Đã Copy!';
        buttonEl.style.backgroundColor = '#d1fae5';
        setTimeout(() => {
          buttonEl.innerHTML = originalText;
          buttonEl.style.backgroundColor = '';
        }, 1500);
      } catch (err) {
        console.error('Lỗi khi sao Copy: ', err);
        alert('Không thể sao Copy vào clipboard.');
      }
    }

    // --- EXPORT (Excel) ---
    function downloadExcel() {
      if (!currentVideoStats.length) { alert("Không có dữ liệu để xuất."); return; }
      const rows = currentVideoStats.map(v => ({
        "Tài khoản Tiktok": v.authorName,
        "Nội dung": v.desc,
        "Ngày đăng": v.created.toLocaleDateString('vi-VN'),
        "View": v.playCount,
        "Like": v.likeCount,
        "Comment": v.commentCount,
        "Share": v.shareCount,
        "Lưu": v.saveCount,
        "URL": v.url
      }));
      const header = ["Tài khoản Tiktok", "Nội dung", "Ngày đăng", "View", "Like", "Comment", "Share", "Lưu", "URL"];
      const ws = XLSX.utils.json_to_sheet(rows, { header: header });
      ws['!cols'] = [
        { wch: 20 }, // Tài khoản
        { wch: 40 }, // Nội dung
        { wch: 15 }, // Ngày đăng
        { wch: 15 }, { wch: 15 }, { wch: 15 }, { wch: 15 }, { wch: 15 }, // Stats
        { wch: 50 }  // URL
      ];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "TikTok Videos");
      const today = new Date(), y = today.getFullYear(), m = String(today.getMonth() + 1).padStart(2, '0'), d = String(today.getDate()).padStart(2, '0');
      const fname = `TikTok_${currentUsername}_${y}${m}${d}.xlsx`;
      XLSX.writeFile(wb, fname);
    }
  </script>
  <script>
    const menuToggle = document.getElementById('menuToggle');
    const navList = document.getElementById('navList');
    if (menuToggle) menuToggle.addEventListener('click', () => { navList.classList.toggle('active'); menuToggle.classList.toggle('active'); });
  </script>

</body>
