<!DOCTYPE html>
<html lang="vi" data-theme="light">

<head>
  <script src="/js/tracking.js"></script>

  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2322C55E'/%3E%3Ctext x='50' y='70' font-family='Arial Black' font-size='60' font-weight='bold' fill='white' text-anchor='middle'%3EH%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css?v=1.4">
  <link rel="stylesheet" href="/css/style.css?v=1.5">
  <link rel="stylesheet" href="/css/toolkit.css?v=20260323">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    .spinner {
      animation: spin 1s linear infinite;
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--color-border);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .tab-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .tab-btn {
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-size: 0.85rem;
      transition: 0.2s;
    }

    .tab-btn.active {
      background: var(--color-primary);
      color: #fff;
    }

    .tab-btn:not(.active) {
      background: var(--color-bg, #f1f5f9);
      color: var(--color-text);
    }

    .hidden {
      display: none !important;
    }

    .profile-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      border: 1px solid var(--color-border);
      border-radius: 12px;
      background: var(--color-bg, #f8fafc);
      margin-bottom: 16px;
    }

    .profile-card img {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #fff;
      box-shadow: 0 2px 4px rgba(0, 0, 0, .1);
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
      margin-top: 12px;
    }

    .data-table th,
    .data-table td {
      border: 1px solid var(--color-border);
      padding: 8px;
      text-align: left;
    }

    .data-table th {
      background: var(--color-bg, #f8fafc);
      font-weight: 700;
    }

    .data-table tr:hover {
      background: rgba(0, 0, 0, .02);
    }

    .copy-btn {
      background: var(--color-bg, #f3f4f6);
      color: var(--color-gray);
      border: 1px solid var(--color-border);
      padding: 2px 8px;
      font-size: 11px;
      font-weight: 500;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s;
    }

    .copy-btn:hover {
      background: var(--color-border);
    }
  </style>
</head>

<body>
  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo"><span class="logo-icon">H</span><span class="hide-mobile">Nguyễn Văn Hảo</span></a>
      <nav class="nav">
        <button class="menu-toggle" id="menuToggle" aria-label="Menu"><span></span><span></span><span></span></button>
        <ul class="nav-list" id="navList">
          <li><a href="/" class="nav-link">Trang chủ</a></li>
          <li><a href="/blog" class="nav-link">Blog</a></li>
          <li><a href="/gioi-thieu" class="nav-link">Giới thiệu</a></li>
          <li><a href="/lien-he" class="nav-link">Liên hệ</a></li>
          <li><a href="/toolkit/" class="nav-link">Công cụ</a></li>
                    <li><a href="/showcase" class="nav-link">Dự án</a></li>
        </ul>
        <a href="/lien-he" class="btn btn-primary hide-mobile">Liên hệ ngay</a>
      </nav>
    </div>
  </header>

  <section class="calc-page">
    <div class="container">
      <a href="/toolkit/" class="back-link">← Quay lại Toolkit</a>
      <div class="calc-header">
        <span class="section-badge" style="background:var(--color-lavender);margin-bottom:12px;display:inline-block;">📊
          TikTok Export</span>
        <h1>Phân tích TikTok (Export)</h1>
        <p>Trích xuất thông tin và danh sách video từ tài khoản hoặc danh sách link TikTok.</p>
      </div>

      <div class="calc-grid">
        <!-- Token Select -->
        <div class="calc-card full-width">
          <h2>🔑 Chọn API Token</h2>
          <div class="input-group">
            <label>Chọn Option API (Công cụ sẽ tự chọn)</label>
            <select id="tokenSelect">
              <option value="" style="color:red;font-weight:bold;"> -- Chọn Option -- </option>
              <option value="apify_api_4hNHrxA9JKTUEcAf4dsi1GyAeeafA70xiVp3">Option 1</option>
              <option value="apify_api_vEzNRPTPbRwWk5XAt7ZZSBVuhcaYL00MZYPx">Option 2</option>
              <option value="apify_api_vVeWJdL0kjKZO6yga3mYCKDk5qLzar3QMLhw">Option 3</option>
              <option value="apify_api_MDtcZFG8e7kC70XGt2q1DZPLVbCEM21eDDSZ">Option 4</option>
              <option value="apify_api_IPiCpAsN7VocO1SHyb7GdHT04fOzY50Vqmer">Option 5</option>
              <option value="apify_api_bjrOJUSNgj6cU0VbskdbAMxJHijLC322ls19">Option 6</option>
              <option value="apify_api_5lVTWGaeMWEbnFHUuMOxHHV9k2qETN3MwwUh">Option 7</option>
              <option value="apify_api_IdbPrRwolcGMrllv0pMaNhPFk7jHsc3fGkm7">Option 8</option>
              <option value="apify_api_8WB2mXbOAqQinR0t3xFBA4DrdEq9s23Kps60">Option 9</option>
              <option value="apify_api_5YQIebMAJqBS6fKsd5lHktTzQgLRhj2yHLey">Option 10</option>
              <option value="apify_api_8FF8IkoEqbD4xvfb12OuVVCfcmrZIG3GUTQc">Option 11</option>
              <option value="apify_api_6gor9Sj91NTXR9YZ5r7HNOffPtGBF93yoQw7">Option 12</option>
              <option value="apify_api_WRggvffpoO0aNjOGDuMWIc5UbqTJ0u2utLnN">Option 13</option>
              <option value="apify_api_BfMSGj74gvX3DdnwX9RAjsWKvLpy4U1le0BL">Option 14</option>
              <option value="apify_api_GpvgqqayoUCCSxKkxG96Jqfup6Z64j28zWFE">Option 15</option>
              <option value="apify_api_dFLcJDqblvw9RODS0XmZpUSwes4rNz34VQ9Q">Option 16</option>
              <option value="apify_api_roGEM1o8Kph9MztX9Pq41zg7RfCfVQ17Equ7">Option 17</option>
              <option value="apify_api_D7qyF2XOfOgDBVghHTRsX0mjp4FFdu2H2QN2">Option 18</option>
            </select>
          </div>
          <div id="apify-balance" style="font-size:0.85rem;margin-top:8px;color:var(--color-gray);">Đang kiểm tra credit
            còn lại...</div>
        </div>

        <!-- Tabs + Forms -->
        <div class="calc-card full-width">
          <div class="tab-bar">
            <button id="tab-channel" class="tab-btn active" onclick="switchTab('channel')">Lọc theo kênh</button>
            <button id="tab-urls" class="tab-btn" onclick="switchTab('urls')">Lọc theo danh sách video</button>
          </div>

          <div id="panel-channel">
            <div class="input-group" style="margin-bottom:12px;"><label>Tên tài khoản TikTok</label><input type="text"
                id="usernameInput" placeholder="Ví dụ: voguevn"></div>
            <div class="input-row">
              <div class="input-group"><label>Từ ngày</label><input id="startDate" type="date"></div>
              <div class="input-group"><label>Đến ngày</label><input id="endDate" type="date"></div>
            </div>
            <div
              style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:16px;padding-top:12px;border-top:1px solid var(--color-border);">
              <div id="status"
                style="font-size:0.85rem;color:var(--color-gray);min-height:32px;display:flex;align-items:center;">
              </div>
              <div style="display:flex;gap:8px;"><button id="download-btn" class="btn-copy" onclick="downloadExcel()"
                  disabled>Xuất Excel</button><button id="fetch-btn" class="btn-calc" onclick="fetchTikTokData()">Lấy Dữ
                  Liệu theo kênh</button></div>
            </div>
          </div>

          <div id="panel-urls" class="hidden">
            <div class="input-group" style="margin-bottom:12px;"><label>Danh sách link video TikTok (mỗi dòng 1
                link)</label><textarea id="videoUrls" rows="4"
                placeholder="https://www.tiktok.com/@username/video/12345"
                style="width:100%;padding:10px;border:1px solid var(--color-border);border-radius:8px;font-size:0.9rem;resize:vertical;"></textarea>
            </div>
            <div
              style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:16px;padding-top:12px;border-top:1px solid var(--color-border);">
              <div id="status-urls"
                style="font-size:0.85rem;color:var(--color-gray);min-height:32px;display:flex;align-items:center;">
              </div>
              <div style="display:flex;gap:8px;"><button id="download-btn-urls" class="btn-copy"
                  onclick="downloadExcel()" disabled>Xuất Excel</button><button id="fetch-btn-urls" class="btn-calc"
                  onclick="fetchTikTokByUrls()">Lấy Dữ Liệu theo danh sách link</button></div>
            </div>
          </div>
        </div>

        <div class="calc-card full-width hidden" id="results-container">
          <div id="profile-info"></div>
          <div id="video-list" style="overflow-x:auto;max-height:600px;"></div>
        </div>
      </div>
    </div>
  </section>

  <script src="/js/main.js?v=1.4"></script>
  <script>
    let currentVideoStats = [];
    let currentUsername = "";
    let currentTab = 'channel';

    const APIFY_LIMITS_URL = 'https://api.apify.com/v2/users/me/limits';
    const APIFY_PROFILE_ACTOR_ENDPOINT = `https://api.apify.com/v2/acts/clockworks~tiktok-scraper/run-sync-get-dataset-items`;
    const APIFY_VIDEO_ACTOR_ENDPOINT = `https://api.apify.com/v2/acts/clockworks~tiktok-video-scraper/run-sync-get-dataset-items`;

    const statusEl = document.getElementById('status');
    const statusUrlsEl = document.getElementById('status-urls');
    const resultsContainerEl = document.getElementById('results-container');
    const profileInfoEl = document.getElementById('profile-info');
    const videoListEl = document.getElementById('video-list');
    const fetchBtn = document.getElementById('fetch-btn');
    const fetchBtnUrls = document.getElementById('fetch-btn-urls');
    const downloadBtn = document.getElementById('download-btn');
    const downloadBtnUrls = document.getElementById('download-btn-urls');

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tab-channel').classList.toggle('active', tab === 'channel');
      document.getElementById('tab-urls').classList.toggle('active', tab === 'urls');
      document.getElementById('panel-channel').classList.toggle('hidden', tab !== 'channel');
      document.getElementById('panel-urls').classList.toggle('hidden', tab !== 'urls');
    }

    function getApifyToken() { return document.getElementById('tokenSelect').value.trim(); }

    function setStatus(msg, loading = false, scope = 'channel') {
      const el = scope === 'urls' ? statusUrlsEl : statusEl;
      const btn = scope === 'urls' ? fetchBtnUrls : fetchBtn;
      if (!el) return;
      el.innerHTML = loading ? `<span class="spinner"></span> ${msg}` : msg;
      if (btn) btn.disabled = loading;
    }

    async function updateTokenOptions() {
      const select = document.getElementById('tokenSelect');
      if (!select) return;
      for (let i = 0; i < select.options.length; i++) { const opt = select.options[i]; if (!opt.dataset.baseLabel) opt.dataset.baseLabel = opt.textContent.trim(); }
      let bestIndex = -1, bestRemain = -Infinity;
      for (let i = 0; i < select.options.length; i++) {
        const opt = select.options[i]; const token = opt.value; if (!token) continue;
        try {
          const resp = await fetch(APIFY_LIMITS_URL, { method: 'GET', headers: { 'Accept': 'application/json', 'Authorization': 'Bearer ' + token } });
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const json = await resp.json(); const data = json?.data || {};
          const max = Number(data?.limits?.maxMonthlyUsageUsd ?? 0), used = Number(data?.current?.monthlyUsageUsd ?? 0), remain = max - used;
          if (Number.isFinite(remain) && remain > 0) { opt.textContent = `${opt.dataset.baseLabel} — còn $${remain.toFixed(2)}`; if (remain > bestRemain) { bestRemain = remain; bestIndex = i; } opt.dataset.remain = remain; }
          else if (Number.isFinite(remain) && remain <= 0) { opt.textContent = `${opt.dataset.baseLabel} — HẾT TIỀN`; opt.style.color = '#dc2626'; opt.style.fontWeight = 'bold'; opt.dataset.remain = 0; }
          else { opt.textContent = `${opt.dataset.baseLabel} — không xác định`; opt.style.color = '#9ca3af'; }
        } catch (e) { opt.textContent = `${opt.dataset.baseLabel} — Lỗi`; opt.style.color = '#9ca3af'; }
      }
      if (bestIndex > -1 && bestRemain > 0) select.selectedIndex = bestIndex;
    }

    async function fetchApifyLimitsAndRender() {
      const el = document.getElementById('apify-balance'); if (!el) return;
      const token = getApifyToken(); if (!token) { el.textContent = 'Vui lòng chọn Option.'; return; }
      el.textContent = 'Đang kiểm tra credit còn lại...';
      try {
        const resp = await fetch(APIFY_LIMITS_URL, { method: 'GET', headers: { 'Accept': 'application/json', 'Authorization': 'Bearer ' + token } });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const json = await resp.json(); const data = json?.data || {};
        const max = Number(data?.limits?.maxMonthlyUsageUsd ?? NaN), used = Number(data?.current?.monthlyUsageUsd ?? NaN);
        const remain = (Number.isFinite(max) && Number.isFinite(used)) ? (max - used) : null;
        el.innerHTML = `<div style="color:#16a34a;font-weight:700;">Credit còn lại: ${typeof remain === 'number' ? `$${remain.toFixed(2)} USD` : '—'}</div>`;
      } catch (e) { el.innerHTML = `<div style="color:#dc2626;font-weight:700;">Không lấy được credit: ${e.message}</div>`; }
    }

    document.addEventListener('DOMContentLoaded', async () => { await updateTokenOptions(); await fetchApifyLimitsAndRender(); document.getElementById('tokenSelect')?.addEventListener('change', fetchApifyLimitsAndRender); });

    async function fetchTikTokData() {
      const username = document.getElementById('usernameInput').value.trim();
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;
      const token = getApifyToken();
      if (!token) { setStatus('Vui lòng chọn một Option API.', false, 'channel'); return; }
      if (!username) { setStatus('Vui lòng nhập tên tài khoản.', false, 'channel'); return; }
      currentUsername = username; setStatus('Đang lọc dữ liệu theo kênh...', true, 'channel');
      resultsContainerEl.classList.add('hidden'); profileInfoEl.innerHTML = ''; videoListEl.innerHTML = '';
      downloadBtn.disabled = true; downloadBtnUrls.disabled = true;
      try {
        const response = await fetch(`${APIFY_PROFILE_ACTOR_ENDPOINT}?token=${token}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ "profiles": [username], "resultsPerPage": 200, "shouldDownloadVideos": false }) });
        if (!response.ok) { const err = await response.json().catch(() => ({ error: { message: 'Lỗi' } })); throw new Error(`API: ${err.error.message}`); }
        const data = await response.json();
        if (!data || data.length === 0) throw new Error('Không có dữ liệu.');
        displayProfileInfo(mapProfileData(data[0]));
        displayVideoTable(mapVideoData(data), startDate, endDate);
        setStatus(`Hoàn thành. Tìm thấy ${data.length} video.`, false, 'channel');
        fetchApifyLimitsAndRender();
      } catch (err) { setStatus(`Lỗi: ${err.message}`, false, 'channel'); }
    }

    async function fetchTikTokByUrls() {
      const urls = document.getElementById('videoUrls').value.split('\n').map(u => u.trim()).filter(Boolean);
      const token = getApifyToken();
      if (!token) { setStatus('Vui lòng chọn một Option API.', false, 'urls'); return; }
      if (!urls.length) { setStatus('Vui lòng nhập ít nhất 1 link video.', false, 'urls'); return; }
      currentUsername = 'URL_List'; setStatus('Đang lấy dữ liệu theo danh sách link...', true, 'urls');
      resultsContainerEl.classList.add('hidden'); profileInfoEl.innerHTML = ''; videoListEl.innerHTML = '';
      downloadBtn.disabled = true; downloadBtnUrls.disabled = true;
      try {
        const response = await fetch(`${APIFY_VIDEO_ACTOR_ENDPOINT}?token=${token}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ "postURLs": urls, "shouldDownloadCovers": false, "shouldDownloadSlideshowImages": false, "shouldDownloadSubtitles": false, "shouldDownloadVideos": false }) });
        if (!response.ok) throw new Error('API lỗi khi gọi theo link.');
        const data = await response.json();
        if (!data || data.length === 0) throw new Error('Không lấy được dữ liệu từ link.');
        profileInfoEl.innerHTML = '';
        displayVideoTable(mapVideoData(data), null, null);
        setStatus(`Hoàn thành. Lấy được ${data.length} video.`, false, 'urls');
        fetchApifyLimitsAndRender();
      } catch (err) { setStatus(`Lỗi: ${err.message}`, false, 'urls'); }
    }

    function mapProfileData(firstVideo) { return { avatarUrl: firstVideo.authorMeta?.avatar, nickname: firstVideo.authorMeta?.nickName, uniqueId: firstVideo.authorMeta?.name, followerCount: firstVideo.authorMeta?.fans, followingCount: firstVideo.authorMeta?.following, heartCount: firstVideo.authorMeta?.heart, videoCount: firstVideo.authorMeta?.video }; }

    function mapVideoData(videos) { return videos.map(v => ({ authorName: v.authorMeta?.name, desc: v.text, created: new Date(v.createTimeISO || (v.createTime * 1000)), playCount: v.playCount || 0, likeCount: v.diggCount || 0, commentCount: v.commentCount || 0, shareCount: v.shareCount || 0, saveCount: v.collectCount || 0, url: v.webVideoUrl || `https://www.tiktok.com/@${v.authorMeta?.name}/video/${v.id}` })); }

    function displayProfileInfo(profile) {
      if (!profile?.uniqueId) { profileInfoEl.innerHTML = ''; return; }
      const fmt = new Intl.NumberFormat('vi-VN');
      profileInfoEl.innerHTML = `<h2>Thông tin Kênh</h2><div class="profile-card"><img src="${profile.avatarUrl}" alt="Avatar"><div><strong style="font-size:1.1rem;">${profile.nickname || ''}</strong><div style="color:var(--color-gray);font-size:0.85rem;">@${profile.uniqueId}</div><div style="display:flex;flex-wrap:wrap;gap:12px;margin-top:4px;font-size:0.85rem;"><span><strong>${fmt.format(profile.followerCount || 0)}</strong> Followers</span><span><strong>${fmt.format(profile.followingCount || 0)}</strong> Following</span><span><strong>${fmt.format(profile.heartCount || 0)}</strong> Thích</span><span><strong>${fmt.format(profile.videoCount || 0)}</strong> Videos</span></div></div></div>`;
    }

    function displayVideoTable(videos, startDate, endDate) {
      let filteredVideos = videos;
      if (currentTab === 'channel' && (startDate || endDate)) {
        const start = startDate ? new Date(startDate) : null; if (start) start.setHours(0, 0, 0, 0);
        const end = endDate ? new Date(endDate) : null; if (end) end.setHours(23, 59, 59, 999);
        filteredVideos = videos.filter(v => { const d = v.created; return (!start || d >= start) && (!end || d <= end); });
      }
      currentVideoStats = filteredVideos;
      if (filteredVideos.length === 0) { videoListEl.innerHTML = `<p style="text-align:center;color:var(--color-gray);padding:24px;">Không có video nào.</p>`; resultsContainerEl.classList.remove('hidden'); return; }
      if (currentTab === 'channel') downloadBtn.disabled = false; else downloadBtnUrls.disabled = false;
      const fmt = new Intl.NumberFormat('vi-VN');
      let html = `<h2>Danh sách Video (${filteredVideos.length})</h2><table class="data-table"><thead><tr><th>Tài khoản</th><th>Nội dung</th><th>Ngày đăng</th><th>Lượt xem</th><th>Thích</th><th>Bình luận</th><th>Chia sẻ</th><th>Lưu</th></tr></thead><tbody>`;
      for (const v of filteredVideos) { html += `<tr><td>${v.authorName || 'N/A'}</td><td title="${v.desc}"><a href="${v.url}" target="_blank" style="color:var(--color-primary);">${(v.desc || '').slice(0, 40)}${(v.desc || '').length > 40 ? '…' : ''}</a></td><td>${v.created.toLocaleDateString('vi-VN')}</td><td>${fmt.format(v.playCount)}</td><td>${fmt.format(v.likeCount)}</td><td>${fmt.format(v.commentCount)}</td><td>${fmt.format(v.shareCount)}</td><td>${fmt.format(v.saveCount)}</td></tr>`; }
      html += `</tbody><tfoot style="background:var(--color-bg,#f8fafc);"><tr><td style="text-align:center;"><button class="copy-btn" onclick="copyColumnData('authorName', this)">📋 Copy</button></td><td style="text-align:center;"><button class="copy-btn" onclick="copyColumnData('desc', this)">📋 Copy</button></td><td style="text-align:center;"><button class="copy-btn" onclick="copyColumnData('created', this)">📋 Copy</button></td><td style="text-align:center;"><button class="copy-btn" onclick="copyColumnData('playCount', this)">📋 Copy</button></td><td style="text-align:center;"><button class="copy-btn" onclick="copyColumnData('likeCount', this)">📋 Copy</button></td><td style="text-align:center;"><button class="copy-btn" onclick="copyColumnData('commentCount', this)">📋 Copy</button></td><td style="text-align:center;"><button class="copy-btn" onclick="copyColumnData('shareCount', this)">📋 Copy</button></td><td style="text-align:center;"><button class="copy-btn" onclick="copyColumnData('saveCount', this)">📋 Copy</button></td></tr></tfoot></table>`;
      videoListEl.innerHTML = html;
      resultsContainerEl.classList.remove('hidden');
    }

    async function copyColumnData(key, buttonEl) {
      if (!currentVideoStats || currentVideoStats.length === 0) return;
      const columnData = currentVideoStats.map(item => { const value = item[key]; if (value instanceof Date) return value.toLocaleDateString('vi-VN'); return value !== undefined ? value : ''; }).join('\n');
      try { await navigator.clipboard.writeText(columnData); const originalText = buttonEl.innerHTML; buttonEl.innerHTML = 'Đã Copy!'; buttonEl.style.backgroundColor = '#d1fae5'; setTimeout(() => { buttonEl.innerHTML = originalText; buttonEl.style.backgroundColor = ''; }, 1500); }
      catch (err) { alert('Không thể sao chép.'); }
    }

    function downloadExcel() {
      if (!currentVideoStats.length) { alert("Không có dữ liệu để xuất."); return; }
      const rows = currentVideoStats.map(v => ({ "Tài khoản Tiktok": v.authorName, "Nội dung": v.desc, "Ngày đăng": v.created.toLocaleDateString('vi-VN'), "View": v.playCount, "Like": v.likeCount, "Comment": v.commentCount, "Share": v.shareCount, "Lưu": v.saveCount, "URL": v.url }));
      const header = ["Tài khoản Tiktok", "Nội dung", "Ngày đăng", "View", "Like", "Comment", "Share", "Lưu", "URL"];
      const ws = XLSX.utils.json_to_sheet(rows, { header });
      ws['!cols'] = [{ wch: 20 }, { wch: 40 }, { wch: 15 }, { wch: 15 }, { wch: 15 }, { wch: 15 }, { wch: 15 }, { wch: 15 }, { wch: 50 }];
      const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "TikTok Videos");
      const today = new Date(), y = today.getFullYear(), m = String(today.getMonth() + 1).padStart(2, '0'), d = String(today.getDate()).padStart(2, '0');
      XLSX.writeFile(wb, `TikTok_${currentUsername}_${y}${m}${d}.xlsx`);
    }
  </script>
</body>
