<!DOCTYPE html>
<html lang="vi" data-theme="light">

<head>
    <script src="/js/tracking.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính Thuế VAT Ngược - Nguyễn Văn Hảo</title>
    <meta name="description" content="Tính thuế VAT ngược nhanh chóng">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2322C55E'/%3E%3Ctext x='50' y='70' font-family='Arial Black' font-size='60' font-weight='bold' fill='white' text-anchor='middle'%3EH%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/main.css?v=1.4">
    <link rel="stylesheet" href="/css/style.css?v=1.5">
    <link rel="stylesheet" href="/css/toolkit.css?v=20260323">
    <style>
        .tax-options {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .tax-option {
            flex: 1;
        }

        .tax-option input {
            display: none;
        }

        .tax-option label {
            display: block;
            text-align: center;
            padding: 12px;
            background: var(--color-white);
            border: 2px solid var(--color-border);
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.2s;
        }

        .tax-option input:checked+label {
            background: #eff6ff;
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .calc-card input[type="text"]#postTaxInput {
            font-size: 1.3rem;
            text-align: right;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="container header-inner">
            <a href="/" class="logo"><span class="logo-icon">H</span><span class="hide-mobile">Nguyễn Văn Hảo</span></a>
            <nav class="nav">
                <button class="menu-toggle" id="menuToggle"
                    aria-label="Menu"><span></span><span></span><span></span></button>
                <ul class="nav-list" id="navList">
                    <li><a href="/" class="nav-link">Trang chủ</a></li>
                    <li><a href="/blog" class="nav-link">Blog</a></li>
                    <li><a href="/gioi-thieu" class="nav-link">Giới thiệu</a></li>
                    <li><a href="/lien-he" class="nav-link">Liên hệ</a></li>
                    <li><a href="/toolkit/" class="nav-link">Công cụ</a></li>
                </ul>
                <a href="/lien-he" class="btn btn-primary hide-mobile">Liên hệ ngay</a>
            </nav>
        </div>
    </header>

    <section class="calc-page">
        <div class="container">
            <a href="/toolkit/" class="back-link">← Quay lại Toolkit</a>
            <div class="calc-header">
                <span class="section-badge"
                    style="background:var(--color-lavender);margin-bottom:12px;display:inline-block;">🧮
                    Calculator</span>
                <h1>Tính Thuế VAT Ngược</h1>
                <p>Tính nhanh giá gốc trước thuế từ giá sau thuế</p>
            </div>

            <div class="calc-grid" style="max-width:500px;">
                <!-- Input card -->
                <div class="calc-card full-width">
                    <h2>💰 Nhập số tiền</h2>
                    <div class="input-group">
                        <label>Số tiền sau thuế (VNĐ)</label>
                        <input type="text" id="postTaxInput" placeholder="0" autocomplete="off">
                    </div>

                    <div class="chip-row">
                        <button class="chip" onclick="setQuickValue(10000000)">10tr</button>
                        <button class="chip" onclick="setQuickValue(15000000)">15tr</button>
                        <button class="chip" onclick="setQuickValue(20000000)">20tr</button>
                        <button class="chip" onclick="setQuickValue(25000000)">25tr</button>
                        <button class="chip" onclick="setQuickValue(30000000)">30tr</button>
                    </div>

                    <div class="input-group">
                        <label>Mức thuế</label>
                    </div>
                    <div class="tax-options">
                        <div class="tax-option">
                            <input type="radio" name="taxRate" id="rate8" value="0.08" checked>
                            <label for="rate8">8%</label>
                        </div>
                        <div class="tax-option">
                            <input type="radio" name="taxRate" id="rate10" value="0.10">
                            <label for="rate10">10%</label>
                        </div>
                    </div>
                </div>

                <!-- Results card -->
                <div class="calc-card full-width">
                    <h2>📊 Kết quả</h2>
                    <div class="results-grid" style="grid-template-columns:1fr 1fr;">
                        <div class="metric">
                            <div class="metric-value" id="taxAmount">0 đ</div>
                            <div class="metric-label">Tiền thuế</div>
                        </div>
                        <div class="metric metric-good">
                            <div class="metric-value" id="preTaxResult">0 đ</div>
                            <div class="metric-label">Giá gốc (trước thuế)</div>
                        </div>
                    </div>
                    <button class="btn-calc" id="btnCopy" onclick="copyValue()" style="margin-top:16px;">Sao chép giá
                        gốc</button>
                </div>
            </div>
        </div>
    </section>

    <script src="/js/main.js?v=1.4"></script>
    <script>
        const input = document.getElementById('postTaxInput');
        const preTaxDisplay = document.getElementById('preTaxResult');
        const taxDisplay = document.getElementById('taxAmount');
        const rates = document.getElementsByName('taxRate');
        const btnCopy = document.getElementById('btnCopy');
        let currentPreTaxRaw = 0;

        function formatNumber(n) { return n.toString().replace(/\D/g, "").replace(/\B(?=(\d{3})+(?!\d))/g, ","); }
        function setQuickValue(amount) { input.value = formatNumber(amount); calculate(); }

        function calculate() {
            let postTaxVal = parseFloat(input.value.replace(/,/g, ''));
            if (isNaN(postTaxVal)) { preTaxDisplay.innerText = "0 đ"; taxDisplay.innerText = "0 đ"; currentPreTaxRaw = 0; return; }
            let selectedRate = 0;
            for (const rate of rates) { if (rate.checked) { selectedRate = parseFloat(rate.value); break; } }
            let preTax = postTaxVal / (1 + selectedRate);
            currentPreTaxRaw = Math.round(preTax);
            preTaxDisplay.innerText = currentPreTaxRaw.toLocaleString('vi-VN') + " đ";
            taxDisplay.innerText = Math.round(postTaxVal - preTax).toLocaleString('vi-VN') + " đ";
        }

        input.addEventListener('input', function () {
            let cursorPosition = this.selectionStart; let oldLength = this.value.length;
            this.value = formatNumber(this.value); let newLength = this.value.length;
            cursorPosition = cursorPosition + (newLength - oldLength);
            this.setSelectionRange(cursorPosition, cursorPosition); calculate();
        });

        rates.forEach(rate => rate.addEventListener('change', calculate));

        function copyValue() {
            if (currentPreTaxRaw === 0) return;
            const textToCopy = currentPreTaxRaw.toString();
            navigator.clipboard.writeText(textToCopy).then(() => {
                const originalText = btnCopy.innerText; btnCopy.innerText = "Đã chép: " + textToCopy;
                btnCopy.style.background = "#10b981";
                setTimeout(() => { btnCopy.innerText = originalText; btnCopy.style.background = ""; }, 1500);
            });
        }
    </script>
</body>

</html>
