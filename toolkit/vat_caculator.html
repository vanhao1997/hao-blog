<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Công cụ tính thuế VAT ngược</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f6f8fa;
            --card: #ffffff;
            --text: #1f2937;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 450px;
        }

        h2 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 25px;
        }

        .form-group { margin-bottom: 10px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 20px;
            box-sizing: border-box;
            outline: none;
            text-align: right;
            font-weight: 700;
        }

        .quick-select {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .btn-chip {
            padding: 6px 12px;
            background: #fff;
            border: 1px solid #d1d5db;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-chip:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .tax-options {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .tax-option { flex: 1; }
        .tax-option input { display: none; }
        .tax-option label {
            display: block;
            text-align: center;
            padding: 10px;
            background: #f3f4f6;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            border: 2px solid transparent;
        }

        .tax-option input:checked + label {
            background: #eff6ff;
            border-color: var(--primary);
            color: var(--primary);
        }

        .result-box {
            background: #f9fafb;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .val { font-weight: 700; }
        .val-total { font-size: 22px; color: #dc2626; }

        .btn-copy {
            width: 100%;
            margin-top: 15px;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
        }

        .btn-copy:active { opacity: 0.8; }
        .hint { font-size: 12px; color: #6b7280; margin-bottom: 8px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Tính Thuế VAT Ngược</h2>

    <div class="form-group">
        <label>Số tiền sau thuế</label>
        <input type="text" id="postTaxInput" placeholder="0" autocomplete="off">
        <div class="hint">Chọn nhanh:</div>
    </div>

    <div class="quick-select">
        <button class="btn-chip" onclick="setQuickValue(10000000)">10tr</button>
        <button class="btn-chip" onclick="setQuickValue(15000000)">15tr</button>
        <button class="btn-chip" onclick="setQuickValue(20000000)">20tr</button>
        <button class="btn-chip" onclick="setQuickValue(25000000)">25tr</button>
        <button class="btn-chip" onclick="setQuickValue(30000000)">30tr</button>
    </div>

    <label>Mức thuế</label>
    <div class="tax-options">
        <div class="tax-option">
            <input type="radio" name="taxRate" id="rate8" value="0.08" checked>
            <label for="rate8">8%</label>
        </div>
        <div class="tax-option">
            <input type="radio" name="taxRate" id="rate10" value="0.10">
            <label for="rate10">10%</label>
        </div>
    </div>

    <div class="result-box">
        <div class="result-item">
            <span>Tiền thuế:</span>
            <span id="taxAmount" class="val">0 đ</span>
        </div>
        <div class="result-item" style="border-top: 1px dashed #ccc; padding-top: 10px;">
            <span>Giá gốc (Trước thuế):</span>
            <span id="preTaxResult" class="val val-total">0 đ</span>
        </div>
    </div>

    <button class="btn-copy" id="btnCopy" onclick="copyValue()">Sao chép giá gốc</button>
</div>

<script>
    const input = document.getElementById('postTaxInput');
    const preTaxDisplay = document.getElementById('preTaxResult');
    const taxDisplay = document.getElementById('taxAmount');
    const rates = document.getElementsByName('taxRate');
    const btnCopy = document.getElementById('btnCopy');

    let currentPreTaxRaw = 0; // Biến lưu trữ số nguyên thuần túy để copy

    function formatNumber(n) {
        return n.toString().replace(/\D/g, "").replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    function setQuickValue(amount) {
        input.value = formatNumber(amount);
        calculate();
    }

    function calculate() {
        let postTaxVal = parseFloat(input.value.replace(/,/g, ''));
        
        if (isNaN(postTaxVal)) {
            preTaxDisplay.innerText = "0 đ";
            taxDisplay.innerText = "0 đ";
            currentPreTaxRaw = 0;
            return;
        }

        let selectedRate = 0;
        for (const rate of rates) {
            if (rate.checked) {
                selectedRate = parseFloat(rate.value);
                break;
            }
        }

        // Tính toán
        let preTax = postTaxVal / (1 + selectedRate);
        currentPreTaxRaw = Math.round(preTax); // Lưu số nguyên thuần túy vào biến

        // Hiển thị
        preTaxDisplay.innerText = currentPreTaxRaw.toLocaleString('vi-VN') + " đ";
        taxDisplay.innerText = Math.round(postTaxVal - preTax).toLocaleString('vi-VN') + " đ";
    }

    input.addEventListener('input', function() {
        let cursorPosition = this.selectionStart;
        let oldLength = this.value.length;
        this.value = formatNumber(this.value);
        let newLength = this.value.length;
        cursorPosition = cursorPosition + (newLength - oldLength);
        this.setSelectionRange(cursorPosition, cursorPosition);
        calculate();
    });

    rates.forEach(rate => rate.addEventListener('change', calculate));

    function copyValue() {
        if (currentPreTaxRaw === 0) return;

        // Copy biến số nguyên thuần túy (ví dụ: 9259259)
        const textToCopy = currentPreTaxRaw.toString();

        navigator.clipboard.writeText(textToCopy).then(() => {
            const originalText = btnCopy.innerText;
            btnCopy.innerText = "Đã chép: " + textToCopy;
            btnCopy.style.background = "#10b981";
            
            setTimeout(() => {
                btnCopy.innerText = originalText;
                btnCopy.style.background = "#2563eb";
            }, 1500);
        }).catch(err => {
            alert('Không thể sao chép, vui lòng thử lại');
        });
    }
</script>

</body>
</html>
