    <style>
        .filter-layout {
            display: grid;
            grid-template-columns: 240px 1fr 240px;
            gap: 0;
            min-height: 80vh;
            border: 1px solid var(--color-border);
            border-radius: 16px;
            overflow: hidden;
            background: #fff;
        }

        @media(max-width:1024px) {
            .filter-layout {
                grid-template-columns: 1fr;
            }
        }

        .filter-panel {
            padding: 20px;
            overflow-y: auto;
            max-height: 85vh;
        }

        .filter-panel h2 {
            font-size: 1rem;
            font-weight: 700;
            border-bottom: 2px solid var(--color-primary);
            padding-bottom: 8px;
            margin: 0 0 12px;
            position: sticky;
            top: -20px;
            background: inherit;
            z-index: 10;
        }

        .panel-left {
            background: #fdfdfd;
            border-right: 1px solid var(--color-border);
        }

        .panel-right {
            background: #fdfdfd;
            border-left: 1px solid var(--color-border);
        }

        .topic-item label {
            display: block;
            padding: 8px 12px;
            margin-bottom: 6px;
            background: var(--color-bg, #f1f5f9);
            border: 1px solid var(--color-border);
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
        }

        .topic-item input[type=checkbox] {
            display: none;
        }

        .topic-item label:hover {
            background: #e2e6ea;
        }

        .topic-item input:checked+label {
            background: var(--color-primary);
            color: #fff;
            border-color: var(--color-primary);
            font-weight: 600;
        }

        .sites-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 10px;
        }

        .site-item {
            padding: 8px 10px;
            background: var(--color-bg, #f8fafc);
            border: 1px solid var(--color-border);
            border-radius: 6px;
        }

        .site-item label {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 0.8rem;
            gap: 8px;
        }

        .site-item input[type=checkbox] {
            width: 16px;
            height: 16px;
        }

        .site-list-wrapper h3 {
            font-size: 0.95rem;
            font-weight: 600;
            margin: 8px 0 12px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--color-border);
        }

        #selected-sites-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        #selected-sites-list li {
            padding: 4px 0;
            border-bottom: 1px solid var(--color-border);
            font-size: 0.8rem;
        }

        #selected-sites-list li a {
            color: var(--color-primary);
            text-decoration: none;
        }

        #selected-sites-list li a:hover {
            text-decoration: underline;
        }

        .view-toggle {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--color-border);
        }

        .view-toggle label {
            display: flex;
            align-items: center;
            font-size: 0.85rem;
            gap: 6px;
            cursor: pointer;
        }
    </style>

            const sitesContainer = document.getElementById('sites-container');
            const sitesListPc = document.getElementById('sites-list-pc');
            const sitesListMobile = document.getElementById('sites-list-mobile');
            const topicsListContainer = document.getElementById('topics-list');
            const topicCheckboxes = topicsListContainer.querySelectorAll('input[type="checkbox"]');
            const selectedSitesList = document.getElementById('selected-sites-list');
            const viewToggles = document.getElementById('view-toggle-container');
            const pcWrapper = document.getElementById('pc-wrapper');
            const mobileWrapper = document.getElementById('mobile-wrapper');

            function renderList(data, container) {
                container.innerHTML = '';
                const sortedSites = data.sort((a, b) => a.name.localeCompare(b.name));
                sortedSites.forEach(site => {
                    const siteItem = document.createElement('div'); siteItem.className = 'site-item'; siteItem.dataset.topicIds = site.topics.join(',');
                    const label = document.createElement('label');
                    const checkbox = document.createElement('input'); checkbox.type = 'checkbox'; checkbox.checked = true; checkbox.dataset.sitename = site.name;
                    label.appendChild(checkbox); label.appendChild(document.createTextNode(' ' + site.name));
                    siteItem.appendChild(label); container.appendChild(siteItem);
                });
            }

            function updateSelectedList() {
                selectedSitesList.innerHTML = '';
                const selectedNames = new Set();
                const allChecked = sitesContainer.querySelectorAll('.sites-list input[type="checkbox"]:checked');
                allChecked.forEach(cb => { const parent = cb.closest('.site-item'); if (parent && parent.style.display !== 'none' && cb.closest('.site-list-wrapper').style.display !== 'none') selectedNames.add(cb.dataset.sitename); });
                Array.from(selectedNames).sort().forEach(name => { const li = document.createElement('li'); const a = document.createElement('a'); a.href = `https://${name}`; a.textContent = name; a.target = '_blank'; li.appendChild(a); selectedSitesList.appendChild(li); });
            }

            function handleTopicSelection() {
                const selectedTopics = []; let allIsChecked = document.getElementById('topic_all').checked;
                topicCheckboxes.forEach(cb => { if (cb.checked) selectedTopics.push(cb.value); });
                const filter = (siteItems) => { if (allIsChecked || selectedTopics.length === 0) { siteItems.forEach(item => item.style.display = 'block'); return; } siteItems.forEach(item => { const siteTopics = item.dataset.topicIds.split(','); item.style.display = siteTopics.some(t => selectedTopics.includes(t)) ? 'block' : 'none'; }); };
                filter(document.querySelectorAll('#sites-list-pc .site-item'));
                filter(document.querySelectorAll('#sites-list-mobile .site-item'));
                updateSelectedList();
            }

            function toggleListViews() {
                pcWrapper.style.display = viewToggles.querySelector('input[value="pc"]').checked ? 'block' : 'none';
                mobileWrapper.style.display = viewToggles.querySelector('input[value="mobile"]').checked ? 'block' : 'none';
                updateSelectedList();
            }

            topicsListContainer.addEventListener('change', (e) => {
                if (e.target.type === 'checkbox') {
                    const allCb = document.getElementById('topic_all');
                    if (e.target.value === 'all' && e.target.checked) { topicCheckboxes.forEach(cb => { if (cb.value !== 'all') cb.checked = false; }); }
                    else if (e.target.value !== 'all' && e.target.checked) { allCb.checked = false; }
                    if (!Array.from(topicCheckboxes).some(cb => cb.checked)) allCb.checked = true;
                    handleTopicSelection();
                }
            });

            sitesContainer.addEventListener('change', (e) => { if (e.target.closest('.sites-list') && e.target.type === 'checkbox') updateSelectedList(); });
            viewToggles.addEventListener('change', toggleListViews);

            renderList(pcSitesData, sitesListPc);
            renderList(mobileSitesData, sitesListMobile);
            handleTopicSelection();
            toggleListViews();
        });
