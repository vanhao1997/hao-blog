<!DOCTYPE html>
<html lang="vi" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <title>Phân tích Kênh TikTok - Nguyễn Văn Hảo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2322C55E'/%3E%3Ctext x='50' y='70' font-family='Arial Black' font-size='60' font-weight='bold' fill='white' text-anchor='middle'%3EH%3C/text%3E%3C/svg%3E">

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css?v=1.4">
  <link rel="stylesheet" href="/css/style.css?v=1.5">
  <link rel="stylesheet" href="/css/toolkit.css">

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <style>
    /* Inherit site-wide font from main.css */

    .spinner {
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #results::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    #results::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }

    #results::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 10px;
    }

    #results::-webkit-scrollbar-thumb:hover {
      background: #9ca3af;
    }

    .tab-btn-active {
      background-color: #2563eb;
      color: white;
    }

    .tab-btn-inactive {
      background-color: #e5e7eb;
      color: #111827;
    }
  </style>
</head>

<body class="text-gray-800">
  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo"><span class="logo-icon">H</span><span class="hide-mobile">Nguyễn Văn Hảo</span></a>
      <nav class="nav">
        <button class="menu-toggle" id="menuToggle" aria-label="Menu"><span></span><span></span><span></span></button>
        <ul class="nav-list" id="navList">
          <li><a href="/" class="nav-link">Trang chủ</a></li>
          <li><a href="/blog.html" class="nav-link">Blog</a></li>
          <li><a href="/about.html" class="nav-link">Giới thiệu</a></li>
          <li><a href="/contact.html" class="nav-link">Liên hệ</a></li>
          <li><a href="/toolkit/" class="nav-link">Công cụ</a></li>
        </ul>
        <a href="/contact.html" class="btn btn-primary hide-mobile">Liên hệ ngay</a>
      </nav>
    </div>
  </header>

  <div class="container mx-auto max-w-5xl p-4 sm:p-6 lg:p-8">
    <a href="/toolkit/" class="back-link">← Quay lại Toolkit</a>

    <div class="text-center mb-8">
      <h1 class="text-3xl sm:text-4xl font-bold text-gray-900">Phân tích TikTok</h1>
      <p class="mt-2 text-md text-gray-600">Trích xuất thông tin và danh sách video từ tài khoản hoặc danh sách link
        TikTok.</p>
    </div>

    <div class="bg-white rounded-2xl shadow-lg p-6 sm:p-8">

      <!-- TOKEN + CREDIT -->
      <div class="bg-gray-50 border border-gray-200 rounded-lg p-4 mb-6">
        <label for="token" class="block text-sm font-medium text-gray-700 mb-1">API Token (Apify)</label>
        <input type="text" id="token" placeholder="Nhập Apify API token của bạn"
          class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
          / value="apify_api_vT6HA6Sbp9OCxsIkteP8A9OxzSuKIR1QCrum">
        <div id="apify-balance" class="text-sm text-gray-700 mt-3">Đang kiểm tra credit còn lại...</div>
      </div>

      <!-- TABS -->
      <div class="flex items-center gap-2 mb-4">
        <button id="tab-channel" class="px-4 py-2 rounded-lg font-semibold tab-btn-active"
          onclick="switchTab('channel')">Lọc theo kênh</button>
        <button id="tab-urls" class="px-4 py-2 rounded-lg font-semibold tab-btn-inactive"
          onclick="switchTab('urls')">Lọc theo danh sách video (To be Update)</button>
      </div>

      <!-- PANEL: CHANNEL -->
      <div id="panel-channel">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="md:col-span-2">
            <label for="usernameInput" class="block text-sm font-medium text-gray-700 mb-1">Tên tài khoản TikTok</label>
            <input type="text" id="usernameInput" placeholder="Ví dụ: voguevn"
              class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150 ease-in-out" />
          </div>

          <div>
            <label for="limitChannel" class="block text-sm font-medium text-gray-700 mb-1">Số lượng video tối đa</label>
            <input id="limitChannel" type="number" min="0" value="100"
              class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition duration-150 ease-in-out" />
          </div>
          <div>
            <label for="startDate" class="block text-sm font-medium text-gray-700 mb-1">Lọc theo kênh — Từ ngày</label>
            <input id="startDate" type="date" placeholder="dd/mm/yyyy"
              class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" />
          </div>
          <div>
            <label for="endDate" class="block text-sm font-medium text-gray-700 mb-1">Lọc theo kênh — Đến ngày</label>
            <input id="endDate" type="date" placeholder="dd/mm/yyyy"
              class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition" />
          </div>
        </div>

        <div class="mt-6 flex items-center justify-between gap-4 border-t border-gray-200 pt-4">
          <div id="status" class="status text-gray-600 text-sm flex items-center min-h-[44px]"></div>
          <div class="flex items-center gap-3 flex-wrap">
            <button id="download-btn"
              class="bg-green-100 text-green-800 hover:bg-green-200 font-semibold py-2 px-4 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed"
              onclick="downloadExcel()" disabled>Xuất Excel</button>
            <button id="fetch-btn"
              class="bg-blue-600 text-white hover:bg-blue-700 font-bold py-2 px-5 rounded-lg shadow-md transition flex items-center justify-center min-w-[150px]"
              onclick="fetchTikTokData()">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
              </svg>
              Lấy Dữ Liệu theo kênh
            </button>
          </div>
        </div>
      </div>

      <!-- PANEL: URL LIST -->
      <div id="panel-urls" class="hidden">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="md:col-span-2">
            <label for="videoUrls" class="block text-sm font-medium text-gray-700 mb-1">Danh sách link video TikTok (mỗi
              dòng 1 link)</label>
            <textarea id="videoUrls" rows="4" placeholder="https://www.tiktok.com/@username/video/12345"
              class="w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
          </div>
        </div>

        <div class="mt-6 flex items-center justify-between gap-4 border-t border-gray-200 pt-4">
          <div id="status-urls" class="text-gray-600 text-sm flex items-center min-h-[44px]"></div>
          <div class="flex items-center gap-3 flex-wrap">
            <button id="download-btn-urls"
              class="bg-green-100 text-green-800 hover:bg-green-200 font-semibold py-2 px-4 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed"
              onclick="downloadExcel()" disabled>Xuất Excel</button>
            <button id="fetch-btn-urls"
              class="bg-purple-600 text-white hover:bg-purple-700 font-bold py-2 px-5 rounded-lg shadow-md transition flex items-center justify-center min-w-[220px]"
              onclick="fetchTikTokByUrls()">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24"
                stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
              </svg>
              Lấy Dữ Liệu theo danh sách link
            </button>
          </div>
        </div>
      </div>
    </div>

    <div id="results-container" class="mt-8 bg-white rounded-2xl shadow-lg p-6 sm:p-8 hidden">
      <div id="profile-info"></div>
      <div id="video-list" class="overflow-x-auto max-h:[600px] relative"></div>
    </div>
  </div>

  <script>
    let currentVideoStats = [];
    let currentUsername = "";
    let currentTab = 'channel';

    const APIFY_ACTOR_ENDPOINT = `https://api.apify.com/v2/acts/clockworks~tiktok-scraper/run-sync-get-dataset-items`;
    const statusEl = document.getElementById('status');
    const statusUrlsEl = document.getElementById('status-urls');
    const resultsContainerEl = document.getElementById('results-container');
    const profileInfoEl = document.getElementById('profile-info');
    const videoListEl = document.getElementById('video-list');
    const fetchBtn = document.getElementById('fetch-btn');
    const fetchBtnUrls = document.getElementById('fetch-btn-urls');
    const downloadBtn = document.getElementById('download-btn');
    const downloadBtnUrls = document.getElementById('download-btn-urls');

    function switchTab(tab) {
      currentTab = tab;
      const btnChannel = document.getElementById('tab-channel');
      const btnUrls = document.getElementById('tab-urls');
      const panelChannel = document.getElementById('panel-channel');
      const panelUrls = document.getElementById('panel-urls');
      if (tab === 'channel') {
        btnChannel.classList.add('tab-btn-active'); btnChannel.classList.remove('tab-btn-inactive');
        btnUrls.classList.add('tab-btn-inactive'); btnUrls.classList.remove('tab-btn-active');
        panelChannel.classList.remove('hidden'); panelUrls.classList.add('hidden');
      } else {
        btnUrls.classList.add('tab-btn-active'); btnUrls.classList.remove('tab-btn-inactive');
        btnChannel.classList.add('tab-btn-inactive'); btnChannel.classList.remove('tab-btn-active');
        panelUrls.classList.remove('hidden'); panelChannel.classList.add('hidden');
      }
    }

    // --- UTILITY FUNCTIONS ---
    function getApifyToken() { return document.getElementById('token').value.trim(); }

    function setStatus(msg, loading = false, scope = 'channel') {
      const el = scope === 'urls' ? statusUrlsEl : statusEl;
      const btn = scope === 'urls' ? fetchBtnUrls : fetchBtn;
      if (!el) return;
      el.innerHTML = loading ? `<span class="spinner h-5 w-5 border-2 border-t-transparent border-blue-500 rounded-full mr-2"></span> ${msg}` : msg;
      if (btn) btn.disabled = loading;
      if (!loading && btn && scope === 'channel') btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg> Lấy Dữ Liệu theo kênh`;
      if (!loading && btn && scope === 'urls') btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg> Lấy Dữ Liệu theo danh sách link`;
    }

    // === APIFY LIMITS (giữ đúng 3 trường & render) ===
    async function fetchApifyLimitsAndRender() {
      const el = document.getElementById('apify-balance');
      if (!el) return;
      const token = (typeof getApifyToken === 'function') ? getApifyToken() : '';
      if (!token) { el.textContent = 'Vui lòng nhập API token.'; return; }
      el.textContent = 'Đang kiểm tra credit còn lại...';
      try {
        const headers = new Headers({ 'Accept': 'application/json', 'Authorization': 'Bearer ' + token });
        const resp = await fetch('https://api.apify.com/v2/users/me/limits', { method: 'GET', headers, redirect: 'follow' });
        if (!resp.ok) { const txt = await resp.text().catch(() => ''); throw new Error(`HTTP ${resp.status} ${txt.slice(0, 160)}`); }
        const json = await resp.json(); const data = json?.data || {};
        const maxMonthlyUsageUsd = data?.limits?.maxMonthlyUsageUsd;
        const monthlyUsageUsd = data?.current?.monthlyUsageUsd;
        const startAt = data?.monthlyUsageCycle?.startAt || '';
        const endAt = data?.monthlyUsageCycle?.endAt || '';
        const maxTxt = (typeof maxMonthlyUsageUsd === 'number') ? `$${maxMonthlyUsageUsd.toFixed(2)} USD` : '—';
        const usedTxt = (typeof monthlyUsageUsd === 'number') ? `$${monthlyUsageUsd.toFixed(2)} USD` : '—';
        const startStr = startAt ? new Date(startAt).toLocaleString('vi-VN') : '—';
        const endStr = endAt ? new Date(endAt).toLocaleString('vi-VN') : '—';
        el.innerHTML = `<div><b>Tổng credit có thể xài:</b> ${maxTxt}</div>
                      <div><b>Đã xài trong tháng:</b> ${usedTxt}</div>
                      <div><b>Reset time:</b> ${startStr} → ${endStr}</div>`;
      } catch (e) {
        console.error(e); el.textContent = 'Không lấy được credit Apify: ' + e.message;
      }
    }
    document.addEventListener('DOMContentLoaded', () => {
      const tokenInput = document.getElementById('token');
      if (tokenInput) {
        fetchApifyLimitsAndRender();
        tokenInput.addEventListener('change', fetchApifyLimitsAndRender);
        tokenInput.addEventListener('blur', fetchApifyLimitsAndRender);
      }
    });

    // --- DATA FETCH: BY CHANNEL ---
    async function fetchTikTokData() {
      const username = document.getElementById('usernameInput').value.trim();
      const startDate = document.getElementById('startDate').value;
      const endDate = document.getElementById('endDate').value;
      const token = getApifyToken();

      if (!username) { setStatus('Vui lòng nhập tên tài khoản.', false, 'channel'); return; }
      if (!token) { setStatus('Vui lòng nhập Apify API token.', false, 'channel'); return; }

      currentUsername = username;
      setStatus('Đang gọi API theo kênh...', true, 'channel');
      resultsContainerEl.classList.add('hidden'); profileInfoEl.innerHTML = ''; videoListEl.innerHTML = '';
      downloadBtn.disabled = true; downloadBtnUrls.disabled = true;

      try {
        const response = await fetch(`${APIFY_ACTOR_ENDPOINT}?token=${token}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify((() => {
            const limit = parseInt(document.getElementById('limitChannel').value, 10) || 0;
            const input = { profiles: [username], shouldDownloadVideos: false };
            if (limit > 0) input.resultsPerPage = limit;
            return input;
          })())
        });
        if (!response.ok) {
          const errorData = await response.json().catch(() => ({ error: { message: 'Lỗi không xác định' } }));
          throw new Error(`API Apify: ${errorData.error.message}`);
        }
        const data = await response.json();
        if (!data || data.length === 0) throw new Error('API không trả về dữ liệu. Tên người dùng có thể không chính xác.');

        const profileData = mapProfileData(data[0]);
        const videoData = mapVideoData(data);

        displayProfileInfo(profileData);
        displayVideoTable(videoData, null, null);
        setStatus(`Hoàn thành. Tìm thấy ${videoData.length} video (trước khi lọc).`, false, 'channel');
        fetchApifyLimitsAndRender();
      } catch (err) {
        console.error(err);
        setStatus(`Lỗi: ${err.message}`, false, 'channel');
      }
    }

    // --- DATA FETCH: BY URL LIST ---
    async function fetchTikTokByUrls() {
      const urls = document.getElementById('videoUrls').value.split('\\n').map(u => u.trim()).filter(Boolean);
      const token = getApifyToken();

      if (!urls.length) { setStatus('Vui lòng nhập ít nhất 1 link video.', false, 'urls'); return; }
      if (!token) { setStatus('Vui lòng nhập Apify API token.', false, 'urls'); return; }

      currentUsername = 'URL_List';
      setStatus('Đang gọi API theo danh sách link...', true, 'urls');
      resultsContainerEl.classList.add('hidden'); profileInfoEl.innerHTML = ''; videoListEl.innerHTML = '';
      downloadBtn.disabled = true; downloadBtnUrls.disabled = true;

      try {
        const response = await fetch(`${APIFY_ACTOR_ENDPOINT}?token=${token}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            "startUrls": urls.map(u => ({ url: u })),
            "shouldDownloadVideos": false
          })
        });
        if (!response.ok) throw new Error('API lỗi khi gọi theo link.');
        const data = await response.json();
        if (!data || data.length === 0) throw new Error('Không lấy được dữ liệu từ link.');

        const videoData = mapVideoData(data);
        // Không có profile khi gọi theo link → không render profile card
        profileInfoEl.innerHTML = '';
        displayVideoTable(videoData, null, null);
        setStatus(`Hoàn thành. Lấy được ${videoData.length} video từ danh sách link.`, false, 'urls');
        fetchApifyLimitsAndRender();
      } catch (err) {
        console.error(err);
        setStatus(`Lỗi: ${err.message}`, false, 'urls');
      }
    }

    // --- DATA MAPPING ---
    function mapProfileData(firstVideo) {
      return {
        avatarUrl: firstVideo.authorMeta?.avatar,
        nickname: firstVideo.authorMeta?.nickName,
        uniqueId: firstVideo.authorMeta?.name,
        followerCount: firstVideo.authorMeta?.fans,
        followingCount: firstVideo.authorMeta?.following,
        heartCount: firstVideo.authorMeta?.heart,
        videoCount: firstVideo.authorMeta?.video,
      };
    }

    function mapVideoData(videos) {
      return videos.map(v => ({
        desc: v.text,
        created: new Date(v.createTimeISO),
        playCount: v.playCount || 0,
        likeCount: v.diggCount || 0,
        commentCount: v.commentCount || 0,
        shareCount: v.shareCount || 0,
        saveCount: v.collectCount || 0,
        url: v.webVideoUrl
      }));
    }

    // --- UI RENDERING ---
    function displayProfileInfo(profile) {
      if (!profile?.uniqueId) { profileInfoEl.innerHTML = ''; return; }
      const fmt = new Intl.NumberFormat('vi-VN');
      profileInfoEl.innerHTML = `
      <h2 class="text-2xl font-bold text-gray-900 mb-4">Thông tin Kênh</h2>
      <div class="flex items-center gap-4 sm:gap-6 border border-gray-200 bg-gray-50 p-4 rounded-lg mb-8">
        <img src="${profile.avatarUrl}" alt="Avatar" class="w-20 h-20 sm:w-24 sm:h-24 object-cover rounded-full border-2 border-white shadow-md">
        <div>
          <h3 class="text-xl font-bold text-gray-800">${profile.nickname || ''}</h3>
          <p class="text-md text-gray-600">@${profile.uniqueId || ''}</p>
          <div class="mt-2 flex flex-wrap gap-x-4 gap-y-1 text-sm text-gray-700">
            <span><strong>${fmt.format(profile.followerCount || 0)}</strong> Followers</span>
            <span><strong>${fmt.format(profile.followingCount || 0)}</strong> Following</span>
            <span><strong>${fmt.format(profile.heartCount || 0)}</strong> Thích</span>
            <span><strong>${fmt.format(profile.videoCount || 0)}</strong> Videos</span>
          </div>
        </div>
      </div>`;
    }

    function displayVideoTable(videos, startDate, endDate) {
      let filteredVideos = videos;
      if (startDate || endDate) {
        const start = startDate ? new Date(startDate + 'T00:00:00') : null;
        const end = endDate ? new Date(endDate + 'T23:59:59') : null;
        filteredVideos = videos.filter(video => {
          const publishedDate = video.created;
          const isAfterStart = start ? publishedDate >= start : true;
          const isBeforeEnd = end ? publishedDate <= end : true;
          return isAfterStart && isBeforeEnd;
        });
      }

      currentVideoStats = filteredVideos;

      if (filteredVideos.length === 0) {
        videoListEl.innerHTML = `<h3 class="text-xl font-bold text-gray-900 mb-4">Danh sách Video</h3><p class="text-center text-gray-500 py-8">Không có video nào trong khoảng thời gian đã chọn.</p>`;
        resultsContainerEl.classList.remove('hidden');
        return;
      }

      // Enable correct download button in active tab
      if (currentTab === 'channel') { downloadBtn.disabled = false; }
      else { downloadBtnUrls.disabled = false; }

      const fmt = new Intl.NumberFormat('vi-VN');
      let html = `
      <h3 class="text-xl font-bold text-gray-900 mb-4">Danh sách Video (${filteredVideos.length})</h3>
      <table class="w-full text-sm text-left text-gray-600 border border-gray-200">
        <thead class="bg-gray-100">
          <tr>
            <th class="px-3 py-2 border">Nội dung</th>
            <th class="px-3 py-2 border">Ngày đăng</th>
            <th class="px-3 py-2 border">Lượt xem</th>
            <th class="px-3 py-2 border">Thích</th>
            <th class="px-3 py-2 border">Bình luận</th>
            <th class="px-3 py-2 border">Lượt chia sẻ</th>
            <th class="px-3 py-2 border">Lượt lưu</th>
          </tr>
        </thead>
        <tbody>`;

      for (const v of filteredVideos) {
        html += `
        <tr class="hover:bg-gray-50">
          <td class="px-3 py-2 border align-top" title="${v.desc}"><a href="${v.url}" target="_blank" class="hover:text-blue-600 hover:underline">${(v.desc || '').slice(0, 40)}${(v.desc || '').length > 40 ? '…' : ''}</a></td>
          <td class="px-3 py-2 border align-top">${v.created.toLocaleDateString('vi-VN')}</td>
          <td class="px-3 py-2 border align-top">${fmt.format(v.playCount)}</td>
          <td class="px-3 py-2 border align-top">${fmt.format(v.likeCount)}</td>
          <td class="px-3 py-2 border align-top">${fmt.format(v.commentCount)}</td>
          <td class="px-3 py-2 border align-top">${fmt.format(v.shareCount)}</td>
          <td class="px-3 py-2 border align-top">${fmt.format(v.saveCount)}</td>
        </tr>`;
      }
      html += '</tbody></table>';
      videoListEl.innerHTML = html;
      resultsContainerEl.classList.remove('hidden');
    }

    // --- EXPORT (Excel) ---
    function downloadExcel() {
      if (!currentVideoStats.length) { alert("Không có dữ liệu để xuất."); return; }
      const rows = currentVideoStats.map(v => ({
        "Nội dung": v.desc,
        "Ngày đăng": v.created.toLocaleDateString('vi-VN'),
        "View": v.playCount,
        "Like": v.likeCount,
        "Comment": v.commentCount,
        "Share": v.shareCount,
        "Lưu": v.saveCount,
        "URL": v.url
      }));
      const header = ["Nội dung", "Ngày đăng", "View", "Like", "Comment", "Share", "Lưu", "URL"];
      const ws = XLSX.utils.json_to_sheet(rows, { header: header });
      ws['!cols'] = header.map(h => ({ wch: h === 'Nội dung' ? 40 : 15 }));
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "TikTok Videos");
      const today = new Date(), y = today.getFullYear(), m = String(today.getMonth() + 1).padStart(2, '0'), d = String(today.getDate()).padStart(2, '0');
      const fname = `TikTok_${currentUsername}_${y}${m}${d}.xlsx`;
      XLSX.writeFile(wb, fname);
    }
  </script>
  <script>
    const menuToggle = document.getElementById('menuToggle');
    const navList = document.getElementById('navList');
    if (menuToggle) menuToggle.addEventListener('click', () => { navList.classList.toggle('active'); menuToggle.classList.toggle('active'); });
  </script>

</body>
