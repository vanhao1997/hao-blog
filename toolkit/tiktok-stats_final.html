<!DOCTYPE html>
<html lang="vi" data-theme="light">

<head>
  <script src="/js/tracking.js"></script>
  <meta charset="UTF-8" />
  <title>Phân tích Kênh TikTok - Nguyễn Văn Hảo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Trích xuất thông tin và danh sách video từ tài khoản TikTok">
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2322C55E'/%3E%3Ctext x='50' y='70' font-family='Arial Black' font-size='60' font-weight='bold' fill='white' text-anchor='middle'%3EH%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css?v=1.4">
  <link rel="stylesheet" href="/css/style.css?v=1.5">
  <link rel="stylesheet" href="/css/toolkit.css?v=20260323">
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    .spinner {
      animation: spin 1s linear infinite;
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--color-border);
      border-top-color: var(--color-primary);
      border-radius: 50%;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .tab-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .tab-btn {
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      font-size: 0.85rem;
      transition: 0.2s;
    }

    .tab-btn.active {
      background: var(--color-primary);
      color: #fff;
    }

    .tab-btn:not(.active) {
      background: var(--color-bg, #f1f5f9);
      color: var(--color-text);
    }

    .hidden {
      display: none !important;
    }

    .profile-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      border: 1px solid var(--color-border);
      border-radius: 12px;
      background: var(--color-bg, #f8fafc);
      margin-bottom: 16px;
    }

    .profile-card img {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #fff;
      box-shadow: 0 2px 4px rgba(0, 0, 0, .1);
    }

    .profile-card .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 4px;
      font-size: 0.85rem;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
      margin-top: 12px;
    }

    .data-table th,
    .data-table td {
      border: 1px solid var(--color-border);
      padding: 8px;
      text-align: left;
    }

    .data-table th {
      background: var(--color-bg, #f8fafc);
      font-weight: 700;
    }

    .data-table tr:hover {
      background: rgba(0, 0, 0, .02);
    }
  </style>
</head>

<body>
  <header class="header">
    <div class="container header-inner">
      <a href="/" class="logo"><span class="logo-icon">H</span><span class="hide-mobile">Nguyễn Văn Hảo</span></a>
      <nav class="nav">
        <button class="menu-toggle" id="menuToggle" aria-label="Menu"><span></span><span></span><span></span></button>
        <ul class="nav-list" id="navList">
          <li><a href="/" class="nav-link">Trang chủ</a></li>
          <li><a href="/blog" class="nav-link">Blog</a></li>
          <li><a href="/gioi-thieu" class="nav-link">Giới thiệu</a></li>
          <li><a href="/lien-he" class="nav-link">Liên hệ</a></li>
          <li><a href="/toolkit/" class="nav-link">Công cụ</a></li>
        </ul>
        <a href="/lien-he" class="btn btn-primary hide-mobile">Liên hệ ngay</a>
      </nav>
    </div>
  </header>

  <section class="calc-page">
    <div class="container">
      <a href="/toolkit/" class="back-link">← Quay lại Toolkit</a>
      <div class="calc-header">
        <span class="section-badge" style="background:var(--color-lavender);margin-bottom:12px;display:inline-block;">📊
          TikTok Analytics</span>
        <h1>Phân tích TikTok</h1>
        <p>Trích xuất thông tin và danh sách video từ tài khoản hoặc danh sách link TikTok.</p>
      </div>

      <div class="calc-grid">
        <!-- Token & Credit -->
        <div class="calc-card full-width">
          <h2>🔑 API Token</h2>
          <div class="input-group">
            <label>API Token (Apify)</label>
            <input type="text" id="token" placeholder="Nhập Apify API token của bạn"
              value="apify_api_vT6HA6Sbp9OCxsIkteP8A9OxzSuKIR1QCrum">
          </div>
          <div id="apify-balance" style="font-size:0.85rem;margin-top:8px;color:var(--color-gray);">Đang kiểm tra credit
            còn lại...</div>
        </div>

        <!-- Tabs + Forms -->
        <div class="calc-card full-width">
          <div class="tab-bar">
            <button id="tab-channel" class="tab-btn active" onclick="switchTab('channel')">Lọc theo kênh</button>
            <button id="tab-urls" class="tab-btn" onclick="switchTab('urls')">Lọc theo danh sách video (To be
              Update)</button>
          </div>

          <!-- PANEL: CHANNEL -->
          <div id="panel-channel">
            <div class="input-group" style="margin-bottom:12px;">
              <label>Tên tài khoản TikTok</label>
              <input type="text" id="usernameInput" placeholder="Ví dụ: voguevn">
            </div>
            <div class="input-row cols-3">
              <div class="input-group"><label>Số lượng video tối đa</label><input id="limitChannel" type="number"
                  min="0" value="100"></div>
              <div class="input-group"><label>Từ ngày</label><input id="startDate" type="date"></div>
              <div class="input-group"><label>Đến ngày</label><input id="endDate" type="date"></div>
            </div>
            <div
              style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:16px;padding-top:12px;border-top:1px solid var(--color-border);">
              <div id="status"
                style="font-size:0.85rem;color:var(--color-gray);min-height:32px;display:flex;align-items:center;">
              </div>
              <div style="display:flex;gap:8px;">
                <button id="download-btn" class="btn-copy" onclick="downloadExcel()" disabled>Xuất Excel</button>
                <button id="fetch-btn" class="btn-calc" onclick="fetchTikTokData()">Lấy Dữ Liệu theo kênh</button>
              </div>
            </div>
          </div>

          <!-- PANEL: URL LIST -->
          <div id="panel-urls" class="hidden">
            <div class="input-group" style="margin-bottom:12px;">
              <label>Danh sách link video TikTok (mỗi dòng 1 link)</label>
              <textarea id="videoUrls" rows="4" placeholder="https://www.tiktok.com/@username/video/12345"
                style="width:100%;padding:10px;border:1px solid var(--color-border);border-radius:8px;font-size:0.9rem;resize:vertical;"></textarea>
            </div>
            <div
              style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:16px;padding-top:12px;border-top:1px solid var(--color-border);">
              <div id="status-urls"
                style="font-size:0.85rem;color:var(--color-gray);min-height:32px;display:flex;align-items:center;">
              </div>
              <div style="display:flex;gap:8px;">
                <button id="download-btn-urls" class="btn-copy" onclick="downloadExcel()" disabled>Xuất Excel</button>
                <button id="fetch-btn-urls" class="btn-calc" onclick="fetchTikTokByUrls()">Lấy Dữ Liệu theo danh sách
                  link</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Results -->
        <div class="calc-card full-width hidden" id="results-container">
          <div id="profile-info"></div>
          <div id="video-list" style="overflow-x:auto;"></div>
        </div>
      </div>
    </div>
  </section>

  <script src="/js/main.js?v=1.4"></script>
  <script>
    let currentVideoStats = [];
    let currentUsername = "";
    let currentTab = 'channel';

    const APIFY_ACTOR_ENDPOINT = `https://api.apify.com/v2/acts/clockworks~tiktok-scraper/run-sync-get-dataset-items`;
    const statusEl = document.getElementById('status');
    const statusUrlsEl = document.getElementById('status-urls');
    const resultsContainerEl = document.getElementById('results-container');
    const profileInfoEl = document.getElementById('profile-info');
    const videoListEl = document.getElementById('video-list');
    const fetchBtn = document.getElementById('fetch-btn');
    const fetchBtnUrls = document.getElementById('fetch-btn-urls');
    const downloadBtn = document.getElementById('download-btn');
    const downloadBtnUrls = document.getElementById('download-btn-urls');

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tab-channel').classList.toggle('active', tab === 'channel');
      document.getElementById('tab-urls').classList.toggle('active', tab === 'urls');
      document.getElementById('panel-channel').classList.toggle('hidden', tab !== 'channel');
      document.getElementById('panel-urls').classList.toggle('hidden', tab !== 'urls');
    }

    function getApifyToken() { return document.getElementById('token').value.trim(); }

    function setStatus(msg, loading = false, scope = 'channel') {
      const el = scope === 'urls' ? statusUrlsEl : statusEl;
      const btn = scope === 'urls' ? fetchBtnUrls : fetchBtn;
      if (!el) return;
      el.innerHTML = loading ? `<span class="spinner"></span> ${msg}` : msg;
      if (btn) btn.disabled = loading;
    }

    async function fetchApifyLimitsAndRender() {
      const el = document.getElementById('apify-balance');
      if (!el) return;
      const token = getApifyToken();
      if (!token) { el.textContent = 'Vui lòng nhập API token.'; return; }
      el.textContent = 'Đang kiểm tra credit còn lại...';
      try {
        const headers = new Headers({ 'Accept': 'application/json', 'Authorization': 'Bearer ' + token });
        const resp = await fetch('https://api.apify.com/v2/users/me/limits', { method: 'GET', headers, redirect: 'follow' });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const json = await resp.json(); const data = json?.data || {};
        const maxMonthlyUsageUsd = data?.limits?.maxMonthlyUsageUsd;
        const monthlyUsageUsd = data?.current?.monthlyUsageUsd;
        const startAt = data?.monthlyUsageCycle?.startAt || '';
        const endAt = data?.monthlyUsageCycle?.endAt || '';
        const maxTxt = (typeof maxMonthlyUsageUsd === 'number') ? `$${maxMonthlyUsageUsd.toFixed(2)} USD` : '—';
        const usedTxt = (typeof monthlyUsageUsd === 'number') ? `$${monthlyUsageUsd.toFixed(2)} USD` : '—';
        const startStr = startAt ? new Date(startAt).toLocaleString('vi-VN') : '—';
        const endStr = endAt ? new Date(endAt).toLocaleString('vi-VN') : '—';
        el.innerHTML = `<div><b>Tổng credit:</b> ${maxTxt} | <b>Đã xài:</b> ${usedTxt} | <b>Reset:</b> ${startStr} → ${endStr}</div>`;
      } catch (e) {
        el.textContent = 'Không lấy được credit Apify: ' + e.message;
      }
    }
    document.addEventListener('DOMContentLoaded', () => {
      const tokenInput = document.getElementById('token');
      if (tokenInput) {
        fetchApifyLimitsAndRender();
        tokenInput.addEventListener('change', fetchApifyLimitsAndRender);
        tokenInput.addEventListener('blur', fetchApifyLimitsAndRender);
      }
    });

    async function fetchTikTokData() {
      const username = document.getElementById('usernameInput').value.trim();
      const token = getApifyToken();
      if (!username) { setStatus('Vui lòng nhập tên tài khoản.', false, 'channel'); return; }
      if (!token) { setStatus('Vui lòng nhập Apify API token.', false, 'channel'); return; }
      currentUsername = username;
      setStatus('Đang gọi API theo kênh...', true, 'channel');
      resultsContainerEl.classList.add('hidden'); profileInfoEl.innerHTML = ''; videoListEl.innerHTML = '';
      downloadBtn.disabled = true; downloadBtnUrls.disabled = true;
      try {
        const response = await fetch(`${APIFY_ACTOR_ENDPOINT}?token=${token}`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify((() => {
            const limit = parseInt(document.getElementById('limitChannel').value, 10) || 0;
            const input = { profiles: [username], shouldDownloadVideos: false };
            if (limit > 0) input.resultsPerPage = limit;
            return input;
          })())
        });
        if (!response.ok) { const errorData = await response.json().catch(() => ({ error: { message: 'Lỗi không xác định' } })); throw new Error(`API Apify: ${errorData.error.message}`); }
        const data = await response.json();
        if (!data || data.length === 0) throw new Error('API không trả về dữ liệu.');
        displayProfileInfo(mapProfileData(data[0]));
        displayVideoTable(mapVideoData(data), null, null);
        setStatus(`Hoàn thành. Tìm thấy ${data.length} video.`, false, 'channel');
        fetchApifyLimitsAndRender();
      } catch (err) { setStatus(`Lỗi: ${err.message}`, false, 'channel'); }
    }

    async function fetchTikTokByUrls() {
      const urls = document.getElementById('videoUrls').value.split('\\n').map(u => u.trim()).filter(Boolean);
      const token = getApifyToken();
      if (!urls.length) { setStatus('Vui lòng nhập ít nhất 1 link video.', false, 'urls'); return; }
      if (!token) { setStatus('Vui lòng nhập Apify API token.', false, 'urls'); return; }
      currentUsername = 'URL_List';
      setStatus('Đang gọi API theo danh sách link...', true, 'urls');
      resultsContainerEl.classList.add('hidden'); profileInfoEl.innerHTML = ''; videoListEl.innerHTML = '';
      downloadBtn.disabled = true; downloadBtnUrls.disabled = true;
      try {
        const response = await fetch(`${APIFY_ACTOR_ENDPOINT}?token=${token}`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ "startUrls": urls.map(u => ({ url: u })), "shouldDownloadVideos": false })
        });
        if (!response.ok) throw new Error('API lỗi khi gọi theo link.');
        const data = await response.json();
        if (!data || data.length === 0) throw new Error('Không lấy được dữ liệu từ link.');
        profileInfoEl.innerHTML = '';
        displayVideoTable(mapVideoData(data), null, null);
        setStatus(`Hoàn thành. Lấy được ${data.length} video.`, false, 'urls');
        fetchApifyLimitsAndRender();
      } catch (err) { setStatus(`Lỗi: ${err.message}`, false, 'urls'); }
    }

    function mapProfileData(firstVideo) {
      return { avatarUrl: firstVideo.authorMeta?.avatar, nickname: firstVideo.authorMeta?.nickName, uniqueId: firstVideo.authorMeta?.name, followerCount: firstVideo.authorMeta?.fans, followingCount: firstVideo.authorMeta?.following, heartCount: firstVideo.authorMeta?.heart, videoCount: firstVideo.authorMeta?.video };
    }

    function mapVideoData(videos) {
      return videos.map(v => ({ desc: v.text, created: new Date(v.createTimeISO), playCount: v.playCount || 0, likeCount: v.diggCount || 0, commentCount: v.commentCount || 0, shareCount: v.shareCount || 0, saveCount: v.collectCount || 0, url: v.webVideoUrl }));
    }

    function displayProfileInfo(profile) {
      if (!profile?.uniqueId) { profileInfoEl.innerHTML = ''; return; }
      const fmt = new Intl.NumberFormat('vi-VN');
      profileInfoEl.innerHTML = `
      <h2>Thông tin Kênh</h2>
      <div class="profile-card">
        <img src="${profile.avatarUrl}" alt="Avatar">
        <div>
          <strong style="font-size:1.1rem;">${profile.nickname || ''}</strong>
          <div style="color:var(--color-gray);font-size:0.85rem;">@${profile.uniqueId || ''}</div>
          <div class="stats">
            <span><strong>${fmt.format(profile.followerCount || 0)}</strong> Followers</span>
            <span><strong>${fmt.format(profile.followingCount || 0)}</strong> Following</span>
            <span><strong>${fmt.format(profile.heartCount || 0)}</strong> Thích</span>
            <span><strong>${fmt.format(profile.videoCount || 0)}</strong> Videos</span>
          </div>
        </div>
      </div>`;
    }

    function displayVideoTable(videos, startDate, endDate) {
      let filteredVideos = videos;
      if (startDate || endDate) {
        const start = startDate ? new Date(startDate + 'T00:00:00') : null;
        const end = endDate ? new Date(endDate + 'T23:59:59') : null;
        filteredVideos = videos.filter(video => {
          const isAfterStart = start ? video.created >= start : true;
          const isBeforeEnd = end ? video.created <= end : true;
          return isAfterStart && isBeforeEnd;
        });
      }
      currentVideoStats = filteredVideos;
      if (filteredVideos.length === 0) {
        videoListEl.innerHTML = `<p style="text-align:center;color:var(--color-gray);padding:24px;">Không có video nào.</p>`;
        resultsContainerEl.classList.remove('hidden'); return;
      }
      if (currentTab === 'channel') { downloadBtn.disabled = false; } else { downloadBtnUrls.disabled = false; }
      const fmt = new Intl.NumberFormat('vi-VN');
      let html = `<h2>Danh sách Video (${filteredVideos.length})</h2><table class="data-table"><thead><tr><th>Nội dung</th><th>Ngày đăng</th><th>Lượt xem</th><th>Thích</th><th>Bình luận</th><th>Chia sẻ</th><th>Lưu</th></tr></thead><tbody>`;
      for (const v of filteredVideos) {
        html += `<tr><td title="${v.desc}"><a href="${v.url}" target="_blank" style="color:var(--color-primary);">${(v.desc || '').slice(0, 40)}${(v.desc || '').length > 40 ? '…' : ''}</a></td><td>${v.created.toLocaleDateString('vi-VN')}</td><td>${fmt.format(v.playCount)}</td><td>${fmt.format(v.likeCount)}</td><td>${fmt.format(v.commentCount)}</td><td>${fmt.format(v.shareCount)}</td><td>${fmt.format(v.saveCount)}</td></tr>`;
      }
      html += '</tbody></table>';
      videoListEl.innerHTML = html;
      resultsContainerEl.classList.remove('hidden');
    }

    function downloadExcel() {
      if (!currentVideoStats.length) { alert("Không có dữ liệu để xuất."); return; }
      const rows = currentVideoStats.map(v => ({ "Nội dung": v.desc, "Ngày đăng": v.created.toLocaleDateString('vi-VN'), "View": v.playCount, "Like": v.likeCount, "Comment": v.commentCount, "Share": v.shareCount, "Lưu": v.saveCount, "URL": v.url }));
      const header = ["Nội dung", "Ngày đăng", "View", "Like", "Comment", "Share", "Lưu", "URL"];
      const ws = XLSX.utils.json_to_sheet(rows, { header });
      ws['!cols'] = header.map(h => ({ wch: h === 'Nội dung' ? 40 : 15 }));
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "TikTok Videos");
      const today = new Date(), y = today.getFullYear(), m = String(today.getMonth() + 1).padStart(2, '0'), d = String(today.getDate()).padStart(2, '0');
      XLSX.writeFile(wb, `TikTok_${currentUsername}_${y}${m}${d}.xlsx`);
    }
  </script>
</body>

</html>
