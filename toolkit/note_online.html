<!DOCTYPE html>
<html lang="vi" data-theme="light">

<head>
    <script src="/js/tracking.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Note Online - Nguyễn Văn Hảo</title>
    <meta name="description" content="Ghi chú online lưu trên trình duyệt">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%2322C55E'/%3E%3Ctext x='50' y='70' font-family='Arial Black' font-size='60' font-weight='bold' fill='white' text-anchor='middle'%3EH%3C/text%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/main.css?v=1.4">
    <link rel="stylesheet" href="/css/style.css?v=1.5">
    <link rel="stylesheet" href="/css/toolkit.css?v=20260323">
    <style>
        .notes-grid {
            display: grid;
            gap: 12px;
            margin-top: 12px;
        }

        .note-item {
            padding: 16px;
            border-radius: 12px;
            border: 1px solid var(--color-border);
            background: var(--color-bg, #f8fafc);
        }

        .note-item h3 {
            font-size: 1rem;
            font-weight: 700;
            margin: 0 0 6px;
        }

        .note-item p {
            font-size: 0.85rem;
            white-space: pre-wrap;
            color: var(--color-gray);
            margin: 0 0 8px;
            line-height: 1.5;
        }

        .note-item .meta {
            font-size: 0.75rem;
            color: var(--color-gray);
            text-align: right;
            opacity: 0.7;
        }

        .note-item .note-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--color-gray);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            transition: 0.2s;
        }

        .delete-btn:hover {
            color: #dc2626;
            background: rgba(220, 38, 38, .1);
        }

        .notes-scroll {
            max-height: 65vh;
            overflow-y: auto;
            padding-right: 4px;
        }

        .notes-scroll::-webkit-scrollbar {
            width: 6px;
        }

        .notes-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .notes-scroll::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <header class="header">
        <div class="container header-inner">
            <a href="/" class="logo"><span class="logo-icon">H</span><span class="hide-mobile">Nguyễn Văn Hảo</span></a>
            <nav class="nav">
                <button class="menu-toggle" id="menuToggle"
                    aria-label="Menu"><span></span><span></span><span></span></button>
                <ul class="nav-list" id="navList">
                    <li><a href="/" class="nav-link">Trang chủ</a></li>
                    <li><a href="/blog" class="nav-link">Blog</a></li>
                    <li><a href="/gioi-thieu" class="nav-link">Giới thiệu</a></li>
                    <li><a href="/lien-he" class="nav-link">Liên hệ</a></li>
                    <li><a href="/toolkit/" class="nav-link">Công cụ</a></li>
                    <li><a href="/showcase.html" class="nav-link">Dự án</a></li>
                </ul>
                <a href="/lien-he" class="btn btn-primary hide-mobile">Liên hệ ngay</a>
            </nav>
        </div>
    </header>

    <section class="calc-page">
        <div class="container">
            <a href="/toolkit/" class="back-link">← Quay lại Toolkit</a>
            <div class="calc-header">
                <span class="section-badge"
                    style="background:var(--color-lavender);margin-bottom:12px;display:inline-block;">📝 Note
                    Tool</span>
                <h1>Note Online</h1>
                <p>Ghi chú của bạn được lưu ngay trên trình duyệt.</p>
            </div>

            <div class="calc-grid">
                <!-- Create Note -->
                <div class="calc-card">
                    <h2>✏️ Tạo Ghi Chú Mới</h2>
                    <form id="note-form">
                        <div class="input-group" style="margin-bottom:12px;">
                            <label for="note-title">Tiêu đề</label>
                            <input type="text" id="note-title" placeholder="Nhập tiêu đề..." required>
                        </div>
                        <div class="input-group" style="margin-bottom:16px;">
                            <label for="note-content">Nội dung</label>
                            <textarea id="note-content" rows="8" placeholder="Nội dung ghi chú..." required
                                style="width:100%;padding:10px;border:1px solid var(--color-border);border-radius:8px;font-size:0.9rem;resize:vertical;font-family:inherit;"></textarea>
                        </div>
                        <button type="submit" class="btn-calc" style="width:100%;">Lưu Ghi Chú</button>
                    </form>
                </div>

                <!-- Notes List -->
                <div class="calc-card" style="grid-column:span 1;">
                    <h2>📋 Danh Sách Ghi Chú</h2>
                    <div id="notes-container" class="notes-scroll">
                        <!-- Notes will be added here via JavaScript -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="/js/main.js?v=1.4"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const noteForm = document.getElementById('note-form');
            const noteTitleInput = document.getElementById('note-title');
            const noteContentInput = document.getElementById('note-content');
            const notesContainer = document.getElementById('notes-container');

            const getNotes = () => { const notes = localStorage.getItem('simple-notes'); return notes ? JSON.parse(notes) : []; };
            const saveNotes = (notes) => { localStorage.setItem('simple-notes', JSON.stringify(notes)); };

            const renderNotes = () => {
                const notes = getNotes();
                notesContainer.innerHTML = '';
                if (notes.length === 0) { notesContainer.innerHTML = '<p style="text-align:center;color:var(--color-gray);padding:40px 0;">Chưa có ghi chú nào. Hãy tạo ghi chú đầu tiên!</p>'; return; }
                notes.sort((a, b) => b.id - a.id);
                const grid = document.createElement('div'); grid.className = 'notes-grid';
                notes.forEach(note => {
                    const el = document.createElement('div'); el.className = 'note-item';
                    const date = new Date(note.id).toLocaleString('vi-VN');
                    el.innerHTML = `<div class="note-header"><h3>${note.title}</h3><button class="delete-btn" data-id="${note.id}" title="Xóa ghi chú"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="pointer-events:none;"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg></button></div><p>${note.content}</p><div class="meta">Tạo lúc: ${date}</div>`;
                    grid.appendChild(el);
                });
                notesContainer.appendChild(grid);
            };

            const addNote = (e) => {
                e.preventDefault();
                const title = noteTitleInput.value.trim(), content = noteContentInput.value.trim();
                if (title && content) { const notes = getNotes(); notes.push({ id: Date.now(), title, content }); saveNotes(notes); noteForm.reset(); renderNotes(); }
            };

            const deleteNote = (e) => {
                if (e.target.classList.contains('delete-btn')) {
                    const noteId = parseInt(e.target.dataset.id);
                    let notes = getNotes(); notes = notes.filter(n => n.id !== noteId); saveNotes(notes); renderNotes();
                }
            };

            noteForm.addEventListener('submit', addNote);
            notesContainer.addEventListener('click', deleteNote);
            renderNotes();
        });
    </script>
</body>

</html>
